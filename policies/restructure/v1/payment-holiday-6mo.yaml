iri: ion://policy/finance.restructure.payment-holiday-6mo

version: "1.0.0"

versionEffectiveFrom: "2026-05-01"

category: RESTRUCTURE

subCategory: PAYMENT_HOLIDAY

status: ratified

ratifiedAt: "2026-04-15"

displayText:
  id: "Keringanan pembayaran — penangguhan 6 bulan"
  en: "Payment holiday — 6-month deferral"

restructureType: PAYMENT_HOLIDAY

holidayDurationMonths: 6

holidayTypes:
  - type: PRINCIPAL_ONLY
    description: "Interest still due monthly; principal payments deferred for 6 months"
  - type: INTEREST_ONLY
    description: "Principal still amortizes; interest deferred and capitalized"
  - type: FULL
    description: "Both principal and interest deferred; all interest capitalized"

interestTreatmentDuringHoliday:
  PRINCIPAL_ONLY: ACCRUES_AND_MUST_BE_PAID_MONTHLY
  INTEREST_ONLY: CAPITALIZED_TO_OUTSTANDING_BALANCE
  FULL: CAPITALIZED_TO_OUTSTANDING_BALANCE

tenureExtensionAfterHoliday: EXTENDED_BY_HOLIDAY_DURATION_MONTHS

eligibilityCriteria:
  - severityRequirement: MATERIAL_FINANCIAL_DISTRESS
  - maxDpdAtApplication: 60
  - maxHolidayGrantedInLoanLifetime: 1
  - requiresCreditCommitteeApproval: true
  - note: "6-month holiday requires higher approval level than 3-month"

applicationProcess:
  borrowerRequestRequired: true
  supportingDocumentsRequired:
    - SURAT_PERMOHONAN
    - LAPORAN_KEUANGAN_TERKINI
    - BUKTI_KESULITAN_MATERIAL
  approvalSlaDays: 14

creditQualityImpact:
  qualityDuringHoliday: DALAM_PERHATIAN_KHUSUS_MINIMUM
  upgradeRestrictedMonths: 6

provisioningImpact:
  increaseInProvisioningLikely: true
  note: "Lender must assess provisioning adequacy per PSAK 71 upon granting 6-month holiday"

processingFee:
  applicable: false

applicablePatterns:
  - personal-loan
  - mortgage
  - vehicle-loan
  - business-loan

applicableLenderTypes:
  - BANK_UMUM
  - MULTIFINANCE

regulatoryBasis:
  - "OJK POJK 40/2019 tentang Penilaian Kualitas Aset Bank Umum"
  - "OJK POJK 22/2023 tentang Perlindungan Konsumen dan Masyarakat di Sektor Jasa Keuangan"
  - "PSAK 71 tentang Instrumen Keuangan"

supersededBy: null

deprecatedAt: null
