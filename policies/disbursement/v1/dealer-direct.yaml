displayText:
  id: "Pencairan langsung ke dealer kendaraan"
  en: "Direct disbursement to vehicle dealer"

disbursementMethod: DEALER_DIRECT

fundsDisbursedTo: VEHICLE_DEALER

disbursementTrigger: LOAN_AGREEMENT_SIGNED_AND_DP_CONFIRMED

dealerAccreditationRequired: true

