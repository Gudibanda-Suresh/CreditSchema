  - vehicle-loan

applicableLenderTypes:
  - BANK_UMUM
  - MULTIFINANCE

regulatoryBasis:
  - "OJK POJK 35/2018 tentang Penyelenggaraan Usaha Perusahaan Pembiayaan"
  - "Peraturan BI tentang Loan to Value Kredit Kendaraan Bermotor"
  - "OJK POJK 40/2019 tentang Penilaian Kualitas Aset Bank Umum"

