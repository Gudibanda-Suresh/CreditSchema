  - DEALER_ACTIVE_SIUP_NIB
  - NO_ADVERSE_DEALER_HISTORY

disbursementAmountBasis: OTR_PRICE_MINUS_BORROWER_DOWN_PAYMENT

downPaymentConfirmation:
  required: true
  verifiedBy: DEALER_RECEIPT_OR_BANK_TRANSFER_PROOF
  minimumDpPolicyRef: ion://policy/finance.ltv-cap.bi-kkb-motor-mobil

bpkbDelivery:
  from: DEALER
  to: LENDER
