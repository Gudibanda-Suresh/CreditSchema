  documentRequired: BPKB_ORIGINAL_WITH_FAKTUR

vehicleHandoverConfirmation:
  required: true
  documentRequired: BERITA_ACARA_SERAH_TERIMA_KENDARAAN
  confirmedBy: BORROWER

disbursementSlaHours: 4

dealerPaymentRail: BI_FAST_OR_RTGS

