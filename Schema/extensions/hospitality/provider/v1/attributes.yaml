openapi: 3.1.1
info:
  title: ION Hospitality Restaurant Ordering Extension (v1)
  description: >
    Restaurant and cloud kitchen provider attributes for the HSC-restaurant-ordering category.
    Covers outlet identity, cuisine types, operating hours (including special holiday hours
    and per-menu-category timings), TDUP/NIB licensing, seating availability,
    halal/hygiene certification at outlet level, delivery radius, self-pickup capability,
    and platform-level features (pre-order, group ordering, live tracking).

    Designed to support the full provider profile as surfaced by Grab Food, Gojek GoFood,
    Zomato, and Swiggy: outlet-level detail, multi-brand support, dynamic scheduling.

    x-beckn-attaches-to: Provider.providerAttributes
  version: 1.0.0
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  contact:
    name: ION Network
    url: https://schema.ion.id

components:
  schemas:
    RestaurantProvider:
      type: object
      title: RestaurantProvider
      description: >
        Restaurant or cloud kitchen provider attributes for online food delivery.
        CRC: HSC-restaurant-ordering
      additionalProperties: true
      x-ion-closed-extensions: false
      x-beckn-attaches-to: Provider.providerAttributes
      x-jsonld:
        '@context': 'https://schema.ion.id/hospitality/provider/v1/context.jsonld'
        '@type': ion:RestaurantProvider
      allOf:
        - $ref: ../../../../core/v2/api/v2.0.0/beckn.yaml#/components/schemas/Attributes

      properties:

        # ── Outlet identity ─────────────────────────────────────────
        outletType:
          type: string
          enum: [RESTAURANT, CLOUD_KITCHEN, CAFE, BAKERY, BAR, FOOD_COURT_STALL,
                 CATERING, FOOD_TRUCK, KIOSK]
          description: >
            Type of food outlet. CLOUD_KITCHEN has no dine-in.
            FOOD_COURT_STALL is a counter within a food court.

        cuisineTypes:
          type: array
          description: >
            List of cuisine types served. Used for discovery and filtering.
            Multiple allowed (e.g. Indonesian + Chinese).
          minItems: 1
          items:
            type: string
            enum: [INDONESIAN, CHINESE, JAPANESE, KOREAN, WESTERN, INDIAN, THAI,
                   MIDDLE_EASTERN, ITALIAN, SEAFOOD, FAST_FOOD, DESSERT,
                   HEALTHY, VEGAN, VEGETARIAN, BAKERY, BEVERAGES, OTHER]

        primaryCuisine:
          type: string
          description: Single primary cuisine for ranking and display. Must be in cuisineTypes.

        brandName:
          type: string
          description: >
            Commercial brand name displayed to consumer. May differ from legal entity name.
            For virtual brands on cloud kitchens.

        parentBrand:
          type: string
          description: >
            Parent brand when outlet operates multiple virtual brands from one kitchen.
            e.g. "Kopi Kenangan Group" operating "Cerita Rasa" and "Kenangan Manis".
          x-ion-condition: Required when outlet has multiple virtual brands

        outletCode:
          type: string
          description: >
            BPP-internal outlet identifier for multi-outlet chains.
            Referenced in analytics and settlement.

        # ── Operational status and hours ───────────────────────────
        outletStatus:
          type: string
          enum: [OPEN, CLOSED, TEMPORARILY_CLOSED, BUSY, PRE_ORDER_ONLY, PAUSED]
          description: >
            Real-time operational status.
            BUSY: accepting orders but with extended prep time.
            PAUSED: operator manually paused orders (e.g. kitchen overwhelmed).
            PRE_ORDER_ONLY: only pre-orders accepted, no immediate orders.

        temporaryClosureEnd:
          type: string
          format: date-time
          description: When the outlet will reopen after TEMPORARILY_CLOSED.
          x-ion-condition: Required when outletStatus is TEMPORARILY_CLOSED

        pausedUntil:
          type: string
          format: date-time
          description: Timestamp when PAUSED status will auto-lift.
          x-ion-condition: Required when outletStatus is PAUSED

        operatingHours:
          type: array
          description: >
            Weekly operating schedule. Multiple entries for the same dayOfWeek
            are allowed (split-shift — e.g. 11:00-15:00 and 17:00-22:00).
            An outlet with 24/7 delivery capability sets opens=00:00 and closes=23:59.
          items:
            type: object
            additionalProperties: false
            required: [dayOfWeek, opens, closes, type]
            properties:
              dayOfWeek:
                type: string
                enum: [MONDAY, TUESDAY, WEDNESDAY, THURSDAY, FRIDAY, SATURDAY, SUNDAY]
              opens:
                type: string
                pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
                description: Local time HH:MM (Asia/Jakarta)
              closes:
                type: string
                pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
                description: Local time HH:MM. 23:59 means closes at midnight.
              type:
                type: string
                enum: [DELIVERY, DINE_IN, SELF_PICKUP, ALL]
                description: Which service mode these hours apply to.
              acceptsOrdersUntil:
                type: string
                pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
                description: >
                  Last time new orders are accepted. Typically 15-30 min before closes
                  to allow kitchen to complete last orders. If absent, defaults to closes.

        holidayHours:
          type: array
          description: >
            Specific dates with non-standard hours. Overrides operatingHours for those dates.
            Used for: national holidays (Lebaran, Natal, Tahun Baru), Ramadan hours,
            local events, renovations.
          items:
            type: object
            additionalProperties: false
            required: [date, closed]
            properties:
              date:
                type: string
                format: date
                description: ISO 8601 date (YYYY-MM-DD)
              closed:
                type: boolean
                description: true = outlet is closed all day on this date
              opens:
                type: string
                pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
                x-ion-condition: Required when closed is false
              closes:
                type: string
                pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
                x-ion-condition: Required when closed is false
              note:
                type: object
                description: Human-readable note about why hours differ.
                properties:
                  id:
                    type: string
                    description: Bahasa Indonesia
                  en:
                    type: string
                    description: English

        menuSchedule:
          type: array
          description: >
            Per-menu-category availability windows. Different menus available at different times:
            breakfast menu 06:00-10:30, lunch menu 11:00-15:00, dinner menu 17:00-22:00,
            late night menu 22:00-02:00. BAP must hide unavailable menu categories.
          items:
            type: object
            additionalProperties: false
            required: [menuCategoryId, availableFrom, availableTo]
            properties:
              menuCategoryId:
                type: string
                description: Matches menuCategory.id in RestaurantMenuItem
              availableFrom:
                type: string
                pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
              availableTo:
                type: string
                pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
              daysOfWeek:
                type: array
                description: Days this schedule applies. If absent, applies every day.
                items:
                  type: string
                  enum: [MONDAY, TUESDAY, WEDNESDAY, THURSDAY, FRIDAY, SATURDAY, SUNDAY]

        # ── Preparation time and capacity ──────────────────────────
        averagePrepTime:
          type: string
          format: duration
          description: >
            Average kitchen-to-ready time under normal load. ISO 8601 duration.
            Used for ETA computation. Updated dynamically by BPP based on historical data.
          example: PT20M

        busyPrepTime:
          type: string
          format: duration
          description: >
            Prep time when kitchen is under high load (outletStatus=BUSY).
            BAP MUST display this to consumer before order placement.
          example: PT35M
          x-ion-condition: Required when outletStatus is BUSY

        maxConcurrentOrders:
          type: integer
          minimum: 1
          description: >
            Maximum simultaneous active orders the kitchen can handle.
            When reached, outletStatus automatically transitions to BUSY or PAUSED.

        preOrderLeadTimeHours:
          type: integer
          minimum: 1
          description: >
            Minimum advance booking required for pre-orders.
            e.g. 2 = consumer must order at least 2 hours before desired delivery time.
          x-ion-condition: Required when outletStatus includes PRE_ORDER_ONLY or preOrderEnabled

        preOrderEnabled:
          type: boolean
          description: Whether outlet accepts advance scheduled orders beyond the current session.
          default: false

        preOrderWindowDays:
          type: integer
          minimum: 1
          maximum: 30
          description: How many days ahead consumer can pre-order. Default 7.
          x-ion-condition: Required when preOrderEnabled is true

        # ── Fulfilment capability ──────────────────────────────────
        fulfilmentModes:
          type: array
          description: Which fulfilment modes this outlet supports.
          minItems: 1
          items:
            type: string
            enum: [DELIVERY, DINE_IN, SELF_PICKUP]

        deliveryRadius:
          type: object
          description: Delivery coverage zone.
          additionalProperties: false
          properties:
            radiusKm:
              type: number
              description: Simple circular radius in kilometres.
            polygonUrl:
              type: string
              format: uri
              description: URL to GeoJSON polygon for non-circular coverage zones.
            maxDeliveryDistanceKm:
              type: number
              description: Hard cap on delivery distance even within polygon.

        minOrderAmount:
          type: number
          description: Minimum basket value in IDR to place a delivery order.
          example: 15000

        minOrderAmountSelfPickup:
          type: number
          description: Minimum basket value for self-pickup orders. Often lower than delivery.
          x-ion-condition: Required when SELF_PICKUP is in fulfilmentModes

        dineInCapacity:
          type: integer
          description: Number of dine-in covers (seats) at this outlet.
          x-ion-condition: Required when DINE_IN is in fulfilmentModes

        selfPickupInstructions:
          type: object
          description: Instructions for self-pickup customers.
          properties:
            id:
              type: string
              description: Bahasa Indonesia
            en:
              type: string
              description: English

        # ── Ratings and badges ────────────────────────────────────
        outletRating:
          type: number
          minimum: 1.0
          maximum: 5.0
          description: Aggregate customer rating. Maintained by BPP.

        totalReviews:
          type: integer
          description: Total number of customer reviews underpinning outletRating.

        badges:
          type: array
          description: >
            Platform-awarded badges. Displayed on outlet card.
            TOP_RATED: sustained high rating. NEW: opened within 30 days.
            POPULAR: high order volume. TRUSTED: verified KYC + hygiene cert.
          items:
            type: string
            enum: [TOP_RATED, NEW, POPULAR, TRUSTED, HALAL_CERTIFIED,
                   HYGIENE_CERTIFIED, FAST_DELIVERY, BEST_VALUE, PROMO_ACTIVE]

        # ── Certifications and licensing ──────────────────────────
        outletHalalStatus:
          type: string
          enum: [HALAL_CERTIFIED, NON_HALAL, HALAL_PENDING, NOT_APPLICABLE]
          description: >
            Halal status at the OUTLET level (distinct from per-item classification).
            A HALAL_CERTIFIED outlet certifies the entire kitchen and supply chain.
          x-ion-regulatory: UU 33/2014; PP 39/2021 tentang Penyelenggaraan Bidang Jaminan Produk Halal

        outletHalalCertNumber:
          type: string
          description: MUI/BPJPH halal certificate number at outlet level.
          x-ion-condition: Required when outletHalalStatus is HALAL_CERTIFIED

        hygieneRating:
          type: string
          enum: [A, B, C, UNRATED]
          description: >
            Government hygiene inspection rating (Dinas Kesehatan grading).
            A = excellent, B = good, C = adequate, UNRATED = not yet inspected.
          x-ion-regulatory: Permenkes 1096/MENKES/PER/VI/2011

        tdupNumber:
          type: string
          description: >
            Tanda Daftar Usaha Pariwisata (TDUP) — restaurant business registration.
            Required for restaurants above UMKM tier.
          x-ion-regulatory: PP 5/2021; PM Parekraf 4/2021
          x-ion-condition: Required for restaurant providers above UMKM tier

        nibRegistered:
          type: boolean
          description: Whether this outlet has active NIB from OSS.
          x-ion-regulatory: PP 5/2021 tentang Penyelenggaraan Perizinan Berusaha

        nibNumber:
          type: string
          x-ion-regulatory: PP 5/2021 OSS-RBA
          x-ion-condition: Required when nibRegistered is true
          description: Nomor Induk Berusaha (13-digit business registration number).

        npwp:
          type: string
          x-ion-regulatory: PMK 112/2022 (NPWP 16-digit format transition)
          description: Outlet NPWP for tax purposes. Required when outlet is PKP-registered.
          x-ion-condition: Required for PKP-registered outlets

        pkpStatus:
          type: string
          enum: [PKP, NON_PKP]
          description: >
            Pengusaha Kena Pajak status. PKP outlets charge PPN (11%) on restaurant meals.
            NON_PKP outlets below PKP threshold do not charge PPN.
          x-ion-regulatory: UU 42/2009 PPN; PMK 197/2013

        alcoholLicense:
          type: string
          description: >
            SIUP-MB (Surat Izin Usaha Perdagangan Minuman Beralkohol) number.
          x-ion-regulatory: Permendag 20/M-DAG/PER/4/2014
          x-ion-condition: Required when outlet serves alcoholic beverages

        # ── Platform features ─────────────────────────────────────
        groupOrderEnabled:
          type: boolean
          description: >
            Whether multiple participants can contribute items to a single order
            (Grab's Group Order / GoFood's Pesan Bareng feature).
          default: false

        groupOrderMaxParticipants:
          type: integer
          minimum: 2
          maximum: 20
          description: Maximum number of participants in a group order.
          x-ion-condition: Required when groupOrderEnabled is true

        tableOrderingEnabled:
          type: boolean
          description: >
            Whether dine-in customers can scan a QR code and order from the table
            (Grab Dine-In / GoFood Makan di Tempat).
          default: false

        cateringEnabled:
          type: boolean
          description: Whether outlet accepts large-volume catering orders with advance booking.
          default: false

        cateringMinOrderAmount:
          type: number
          description: Minimum IDR value for catering orders.
          x-ion-condition: Required when cateringEnabled is true

        cateringLeadTimeHours:
          type: integer
          description: Minimum hours advance notice required for catering orders.
          x-ion-condition: Required when cateringEnabled is true

        loyaltyProgramEnabled:
          type: boolean
          description: >
            Whether this outlet participates in a loyalty/points program.
            e.g. GrabRewards, GoPoints, Zomato Gold.
          default: false

        loyaltyProgramId:
          type: string
          description: Identifier of the loyalty program this outlet participates in.
          x-ion-condition: Required when loyaltyProgramEnabled is true

        subscriptionMealPlanEnabled:
          type: boolean
          description: >
            Whether the outlet offers subscription meal plans (daily/weekly lunch delivery,
            diet meal plans). Enables recurring-order commerce pattern.
          default: false

        contactlessDeliveryAvailable:
          type: boolean
          description: >
            Whether contactless delivery (leave at door) is available.
            Required in hygiene-sensitive contexts.
          default: true

        packagingType:
          type: string
          enum: [STANDARD, ECO_FRIENDLY, INSULATED, PREMIUM]
          description: >
            Default packaging type. ECO_FRIENDLY outlets use biodegradable containers.
            INSULATED for ice cream, frozen items.

        cutleryOptIn:
          type: boolean
          description: >
            Whether cutlery is provided by default (true) or opt-in only (false).
            Grab/GoFood default to opt-in to reduce plastic waste.
          default: false

        averageDeliveryTime:
          type: string
          format: duration
          description: >
            Historical average total delivery time (prep + rider pickup + delivery).
            Shown on outlet card in BAP. ISO 8601 duration.
          example: PT35M

        popularOrderTimes:
          type: array
          description: >
            Peak order windows at this outlet. BAP may surface "order before X to avoid wait".
          items:
            type: object
            additionalProperties: false
            required: [dayOfWeek, peakStart, peakEnd]
            properties:
              dayOfWeek:
                type: string
                enum: [MONDAY, TUESDAY, WEDNESDAY, THURSDAY, FRIDAY, SATURDAY, SUNDAY]
              peakStart:
                type: string
                pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
              peakEnd:
                type: string
                pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'

        # ── KYC ───────────────────────────────────────────────────
        kycStatus:
          type: string
          enum: [PENDING, APPROVED, APPROVED_WITH_CAVEATS, SUSPENDED, REJECTED]
          description: KYC status of this outlet with the platform.

        kycCaveats:
          type: array
          description: Outstanding KYC items when kycStatus is APPROVED_WITH_CAVEATS.
          x-ion-condition: Required when kycStatus is APPROVED_WITH_CAVEATS
          items:
            type: string

        catalogVersion:
          type: string
          description: Version hash of the outlet's current published menu. Used for cache invalidation.

        catalogPublishedAt:
          type: string
          format: date-time
          description: When the current catalog version was published.
