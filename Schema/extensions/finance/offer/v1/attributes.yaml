openapi: "3.1.1"
info:
  title: "ION Finance Credit Offer Extension (v1)"
  version: 1.0.0
  description: |
    Per-applicant credit offer pricing schema for the Finance / Credit domain.

    Returned in the ION/Beckn on_select (and optionally on_init) response after
    the lender evaluates a specific borrower's profile against the
    CreditProduct product template.

    KEY DISTINCTION:
      - CreditProduct = product template with RANGES (e.g., rate 7.5%â€“14%)
      - CreditApproval    = per-applicant decision with EXACT values (rate 9.5%)

    ION v2.0 placement:
      Placed in Offer.offerAttributes within Contract.commitments[].offer in on_select.
      The Beckn Offer wrapping it must carry:
        Offer.id          â€” matches offerReference
        Offer.resourceIds â€” references the Resource(s) this offer is for
        Offer.validity    â€” endDate mirrors validUntil (protocol-layer expiry)
        Offer.offerAttributes["@context"] â€” context.jsonld URI
        Offer.offerAttributes["@type"]    â€” "ion:CreditApproval"

    Regulatory anchor: Per POJK 6/POJK.07/2022, lenders must disclose the
    APR-equivalent (aprEquivalent) in all formal offers before the borrower
    signs (RIPLAY / SPPP document).
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  contact:
    name: ION Network
    url: https://schema.ion.id

components:
  schemas:

    CreditOfferAttributes:
      type: object
      description: |
        Specific, time-limited credit offer issued to an individual borrower.
        All fields contain exact values â€” not ranges. Represents the lender's
        formal credit decision (APPROVED, CONDITIONALLY_APPROVED, or REJECTED).
        Once the borrower confirms and conditions are met, this offer becomes the
        basis for the LoanAgreement.
      x-jsonld:
        '@context': ./context.jsonld
        '@type': ion:CreditApproval
      x-beckn-attaches-to: Offer.offerAttributes
      additionalProperties: true
      required:
        - offerReference
        - validUntil
        - offerStatus
        - approvedPrincipal
        - approvedTenor
        - effectiveRate
        - monthlyInstallment
        - totalFees
      properties:

        offerReference:
          type: string
          description: |
            Unique offer reference identifier generated by the lender's system.
            Used to correlate the Beckn on_select offer with the lender's internal
            credit application record. Must be unique per borrower per application.
          example: "OFFER-BRI-KPR-2024-001234"

        validUntil:
          type: string
          format: date-time
          description: |
            Offer validity expiry timestamp in ISO 8601 format with timezone offset.
            After this timestamp the offer must not be accepted. Always include +07:00.
          example: "2024-03-15T23:59:59+07:00"

        offerStatus:
          type: string
          description: Current status of this credit offer.
          enum:
            - UNDER_EVALUATION
            - APPROVED
            - CONDITIONALLY_APPROVED
            - REJECTED
            - EXPIRED
          example: "APPROVED"

        approvedPrincipal:
          type: object
          description: Exact approved principal amount (plafond yang disetujui) for this borrower.
          required: [value, currency]
          properties:
            value:
              type: number
              description: Approved principal in IDR (exact integer, rounded to nearest IDR 1,000,000 for KPR).
              example: 450000000
            currency:
              type: string
              default: IDR
              description: ISO 4217 currency code. Must match CreditProduct.productIdentity.currency.

        approvedTenor:
          type: object
          description: Exact approved tenure / maturity agreed for this borrower.
          required: [value, unit]
          properties:
            value:
              type: integer
              description: Approved tenure as an integer in the unit specified.
              example: 240
            unit:
              type: string
              enum: [DAYS, MONTHS, YEARS]
              description: Time unit for the approved tenure.
              example: "MONTHS"

        effectiveRate:
          type: object
          description: Exact annual interest rate or margin/nisbah ratio offered to this borrower.
          required: [percentPerYear, method]
          properties:
            percentPerYear:
              type: number
              description: The applicable annual rate in percent (% per tahun).
              example: 9.5
            method:
              type: string
              description: Calculation method (ANNUITY, FLAT, EFFECTIVE).
              enum: [ANNUITY, FLAT, EFFECTIVE]
              example: "ANNUITY"
            yieldType:
              type: string
              description: Nature of the cost-of-fund mechanism for this offer.
              enum: [FIXED, FLOATING, COMBINED, MARGIN, NISBAH]
              example: "FIXED"
            fixedPeriodYears:
              type: integer
              description: Number of years at the fixed rate before switching to floating (COMBINED only).
              example: 3
            floatingRateAfterFixedPercent:
              type: number
              description: Floating rate that applies after the fixed period ends (COMBINED only).
              example: 12.5

        monthlyInstallment:
          type: object
          description: Monthly installment amount breakdown for this specific offer.
          required: [totalIDR]
          properties:
            totalIDR:
              type: number
              description: Total monthly payment amount in IDR (auto-debit amount).
              example: 4193000
            principalIDR:
              type: number
              description: Principal repayment component of the first monthly installment in IDR.
              example: 630500
            interestIDR:
              type: number
              description: Interest / margin component of the first monthly installment in IDR.
              example: 3562500

        totalFees:
          type: object
          description: |
            Complete fee breakdown for this approved offer. Includes APR-equivalent
            for POJK 6/2022 RIPLAY transparency disclosure. All amounts in IDR.
          properties:
            provisionFeeIDR:
              type: number
              description: Provision / origination fee in IDR.
              example: 4500000
            administrationFeeIDR:
              type: number
              description: Administration fee in IDR (IDR 0 for KUR/FLPP per regulation).
              example: 200000
            appraisalFeeIDR:
              type: number
              description: KJPP collateral appraisal fee in IDR.
              example: 750000
            notaryFeeIDR:
              type: number
              description: Estimated notary / PPAT fee in IDR.
              example: 5000000
            lifeInsurancePremiumIDR:
              type: number
              description: Life insurance single premium for full tenure in IDR (paid upfront at akad).
              example: 1200000
            annualFireInsuranceIDR:
              type: number
              description: Annual fire insurance premium in IDR (mandatory for KPR per PBI 12/2010).
              example: 850000
            stampDutyIDR:
              type: integer
              description: Stamp duty per document (IDR 10,000 per UU No. 10/2020).
              default: 10000
            totalUpfrontCostsIDR:
              type: number
              description: Total of all upfront costs paid at or before akad signing in IDR (RIPLAY disclosure).
              example: 12955000
            aprEquivalent:
              type: number
              description: |
                All-in annualised cost of credit as % (APR equivalent).
                Mandatory RIPLAY disclosure per POJK 6/POJK.07/2022.
              example: 11.2

        additionalConditions:
          type: array
          items:
            type: string
          description: |
            Outstanding conditions for CONDITIONALLY_APPROVED offers, or
            rejection reason for REJECTED offers (POJK 6/2022 â€” SPPP letter required).
          example:
            - "Submit original SHM (free of encumbrance) to the branch office within 14 working days"
            - "Sign the Akad Kredit before a notary designated by the bank"
            - "Open a savings account at this bank for auto-debit installment payments"

        disbursementSchedule:
          type: object
          description: Expected disbursement timeline and method after all conditions are met.
          properties:
            targetBusinessDays:
              type: integer
              description: Target business days from complete document submission to disbursement.
              example: 10
            disbursementMethod:
              type: string
              description: Mechanism through which funds are transferred.
              enum:
                - BANK_TRANSFER
                - DEVELOPER_TRANSFER
                - DEALER_TRANSFER
                - CASH
                - VIRTUAL_ACCOUNT

        internalCreditScore:
          type: object
          description: Lender's internal credit risk assessment result for this borrower.
          properties:
            score:
              type: integer
              description: Lender's internal credit score on their proprietary scale.
              example: 720
            category:
              type: string
              description: Qualitative credit risk category.
              enum: [EXCELLENT, GOOD, FAIR, POOR]
              example: "GOOD"
            slikGrade:
              type: string
              description: Collectibility grade from OJK SLIK / iDEB credit bureau check.
              enum: ["1", "2"]
              example: "1"
      x-ion-closed-extensions: false
      allOf:
        - $ref: ../../../../core/v2/api/v2.0.0/beckn.yaml#/components/schemas/Attributes

