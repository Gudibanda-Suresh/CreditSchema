        refund timeline without changing state.
        If `context.try: false` — returns CANCELLED contract with settlement details.
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context'
                    - type: object
                      properties:
                        action:
                          type: string
                          enum: [on_cancel]
                message:
                  $ref: '#/components/schemas/OnCancelAction'
      responses:
        '200':
          description: ACK from BAP — cancellation result received
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '500':
