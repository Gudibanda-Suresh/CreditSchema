      summary: BPP returns ACTIVE contract with signed ion:LoanAgreement (async callback)
      description: >
        The BPP confirms disbursement and returns an ACTIVE contract with
        `ion:LoanAgreement` in `contractAttributes`. Contains the contract number,
        loan account number, agreed terms, and disbursement details.

        **Schema placement:**
        - `message.contract.contractAttributes` → `{ "@type": "ion:LoanAgreement", ... }`
        - `message.contract.participants[].participantAttributes` → `ion:Borrower`, `ion:Lender`
        - `message.contract.settlements[].settlementAttributes` → `cc:AmortisationRow`
        - `message.contract.performance[].performanceAttributes` → `cc:DisbursementPerformance`
