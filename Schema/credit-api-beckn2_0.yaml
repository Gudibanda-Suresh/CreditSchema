  # ── POST-FULFILLMENT ──────────────────────────────────────────────────────
  /rate:
    post:
      operationId: rate
      tags: [Post-Fulfillment]
      summary: BAP submits borrower rating for the credit product and service experience
      description: >
        Submits a rating (1–5) for any ratable entity: the loan product, the
        lender service, the disbursement experience, or the BAP platform itself.

        Supports `context.try` pattern:
        `try: true` → preview rating form/criteria without recording;
        `try: false` → record the rating and return confirmation via `/on_rate`.
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context'
                    - type: object
                      properties:
                        action:
                          type: string
                          enum: [rate]
                message:
                  $ref: '#/components/schemas/RateAction'
            example:
              context:
                version: "2.0.0"
                action: "rate"
                domain: "ion:finance"
                bapId: "superapp.id"
                bapUri: "https://superapp.id/beckn"
                bppId: "bmtap-gateway.co.id"
                bppUri: "https://bmtap-gateway.co.id/beckn"
                transactionId: "txn-a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                messageId: "msg-bbbbcccc-dddd-eeee-ffff-000011112222"
                timestamp: "2024-06-30T14:00:00+07:00"
                ttl: "PT30S"
              message:
                ratings:
                  - id: "d4e5f6a7-88ee-8d2f-4de6-1g95h4j30442"
                    ratingCategory: "Contract"
                    value: "4"
                    feedback: "Fast disbursement but document upload UX needs improvement"
      responses:
        '200':
          description: ACK — rating received; confirmation follows via `/on_rate`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '409':
          $ref: '#/components/responses/AckNoCallback'
        '500':
          $ref: '#/components/responses/ServerError'

  /on_rate:
    post:
      operationId: onRate
      tags: [Post-Fulfillment]
      summary: BPP acknowledges rating and optionally returns aggregate or feedback form
      description: >
        If `context.try: true` — returns rating form / criteria (preview mode).
        If `context.try: false` — confirms the rating was recorded; optionally
        returns an aggregate rating snapshot. If rating ≤ 2, may include a
        grievance submission link.
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context'
                    - type: object
                      properties:
                        action:
                          type: string
                          enum: [on_rate]
                message:
                  $ref: '#/components/schemas/OnRateAction'
      responses:
        '200':
          description: ACK from BAP — rating acknowledgement received
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /support:
    post:
      operationId: support
      tags: [Post-Fulfillment]
      summary: BAP requests support contact or raises a grievance ticket
      description: >
        The BAP requests support channels or submits a grievance for a specific
        contract. Supports the `context.try` pattern:
        `try: true` → returns available support channels without creating a ticket;
        `try: false` → creates/links a support ticket and returns contact details.

        Regulatory basis: lenders must provide accessible grievance redressal per
        POJK 18/POJK.07/2023 (OJK Consumer Protection).
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context'
                    - type: object
                      properties:
                        action:
                          type: string
                          enum: [support]
                message:
                  $ref: '#/components/schemas/SupportAction'
      responses:
        '200':
          description: ACK — support request received; contact details follow via `/on_support`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '409':
          $ref: '#/components/responses/AckNoCallback'
        '500':
          $ref: '#/components/responses/ServerError'

  /on_support:
    post:
      operationId: onSupport
      tags: [Post-Fulfillment]
      summary: BPP returns support contacts, ticket reference, and GRO details
      description: >
        If `context.try: true` — returns available support channels (preview mode).
        If `context.try: false` — returns support contact details with ticket number
        and Grievance Redressal Officer (GRO) information.
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context'
                    - type: object
                      properties:
                        action:
                          type: string
                          enum: [on_support]
                message:
                  $ref: '#/components/schemas/OnSupportAction'
      responses:
        '200':
          description: ACK from BAP — support contact details received
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

# ─────────────────────────────────────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────────────────────────────────────
components:

  parameters:
    AuthorizationHeader:
      name: Authorization
      in: header
      required: true
      description: >
        Beckn HTTP Signature (Ed25519) as required by the Beckn Protocol spec.
        All requests MUST carry a valid signature. The `Ack` response body MUST
        carry a `CounterSignature` proving receipt.
        Format: `Signature keyId="<subscriberId>|<keyId>|ed25519",
        algorithm="ed25519",created="<epoch>",expires="<epoch>",
        headers="(created) (expires) digest",signature="<base64>"`
      schema:
        type: string

  responses:
    NackBadRequest:
      description: NACK — Bad request (malformed context, missing required fields, or invalid action)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AckResponse'
    NackUnauthorized:
      description: NACK — Unauthorized (invalid or missing Authorization signature)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AckResponse'
    AckNoCallback:
      description: NACK — No callback available for this request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AckResponse'
    ServerError:
      description: Server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AckResponse'

  schemas:

    # ── CONTEXT ──────────────────────────────────────────────────────────────
    Context:
      type: object
      description: >
        Base Beckn v2.0 context block for all API calls. Carries addressing
        information (BAP/BPP identifiers and URIs), protocol version, the action
        being called, transaction and message IDs, TTL, and schema context URIs.
        No required-field constraints are imposed here — endpoint-specific
        validation is defined inline per operation.
      properties:
        domain:
          type: string
          description: Domain code for this transaction
          example: "ion:finance"
        location:
          type: object
          description: Geographic scope of the transaction
          properties:
            country:
              type: object
              properties:
                code:
                  type: string
                  description: ISO 3166-1 alpha-2 country code
                  example: "ID"
            city:
              type: object
              properties:
                code:
                  type: string
                  description: Beckn city registry code
                  example: "std:021"
        action:
          type: string
          description: The Beckn protocol action being called
          enum:
            - catalog/publish
            - catalog_publish
            - discover
            - on_discover
            - select
            - on_select
            - init
            - on_init
            - confirm
            - on_confirm
            - status
            - on_status
            - update
            - on_update
            - cancel
            - on_cancel
            - track
            - on_track
            - rate
            - on_rate
            - support
            - on_support
        version:
          type: string
          description: Beckn protocol version
          enum: ["2.0.0"]
          example: "2.0.0"
        bapId:
          type: string
          description: Subscriber ID of the BAP as registered on dedi.global
          example: "superapp.id"
        bapUri:
          type: string
          format: uri
          description: Callback URL of the BAP (must match registry record)
          example: "https://superapp.id/beckn"
        bppId:
          type: string
          description: Subscriber ID of the BPP as registered on dedi.global
          example: "bmtap-gateway.co.id"
        bppUri:
          type: string
          format: uri
          description: Request URL of the BPP (must match registry record)
          example: "https://bmtap-gateway.co.id/beckn"
        transactionId:
          type: string
          format: uuid
          description: >
            Stable UUID that spans the full loan lifecycle from discover through
            all servicing actions. Generated once per borrower session and reused
            across all messages in that flow.
          example: "txn-a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        messageId:
          type: string
          format: uuid
          description: >
            Unique UUID for this specific message. Must differ from `transactionId`
            and from every other `messageId` in the transaction. Used for
            idempotency and deduplication.
          example: "msg-11112222-3333-4444-5555-666677778888"
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp of message generation including timezone offset
          example: "2024-05-10T09:00:00+07:00"
        ttl:
          type: string
          description: Message TTL in ISO 8601 duration format
          example: "PT30S"
          default: "PT30S"
        try:
          type: boolean
          description: >
            Sandbox / two-phase flag. `true` = preview mode (no state change);
            `false` (default) = commit the action. Applicable to `update`,
            `cancel`, `rate`, and `support` actions.
          default: false
        networkId:
          type: string
          description: >
            Unique identifier of the Beckn network (registry namespace).
            Format: `{namespace_id}/{registry_id}@{dedi-host}`
          example: "financial-services/credit-net"
        schemaContext:
          type: array
          description: JSON-LD context URIs for the domain schemas in this message
          items:
            type: string
            format: uri
          example:
            - "https://schema.ion.id/finance/resource/v1/context.jsonld"
            - "https://schema.ion.id/finance/offer/v1/context.jsonld"

    # ── ACK RESPONSE ─────────────────────────────────────────────────────────
    AckResponse:
      type: object
      description: Standard synchronous Beckn response envelope
      required: [message]
      properties:
        context:
          $ref: '#/components/schemas/Context'
        message:
          type: object
          required: [ack]
          properties:
            ack:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [ACK, NACK]
                  example: "ACK"
                tags:
                  type: array
                  description: Additional metadata on the ACK (e.g. error codes for NACK)
                  items:
                    $ref: '#/components/schemas/TagGroup'
        error:
          $ref: '#/components/schemas/Error'

    # ── ERROR ─────────────────────────────────────────────────────────────────
    Error:
      type: object
      description: Error details returned with a NACK
      properties:
        code:
          type: string
          example: "CONTEXT-ERROR"
        type:
          type: string
          enum: [CONTEXT-ERROR, CORE-ERROR, DOMAIN-ERROR, POLICY-ERROR]
        message:
          type: string
          example: "Invalid transactionId format"
        path:
          type: string
          example: "context.transactionId"

    # ── TAG GROUP ─────────────────────────────────────────────────────────────
    TagGroup:
      type: object
      properties:
        descriptor:
          type: object
          properties:
            code: { type: string }
            name: { type: string }
        display:
          type: boolean
          default: true
        list:
          type: array
          items:
            type: object
            properties:
              descriptor:
                type: object
                properties:
                  code: { type: string }
                  name: { type: string }
              value: { type: string }
              display: { type: boolean }

    # ── CREDIT RESOURCE (ion:CreditProduct) ──────────────────────────────────
    CreditProduct:
      type: object
      description: >
        `ion:CreditProduct` — Beckn v2.0 credit product catalog template.
        Placed in `catalog.resources[].resourceAttributes` in `on_discover`.
        CRC: `FNC-lending` (FIN-02 Lending & Consumer Credit).
        Full schema: https://schema.ion.id/finance/resource/v1/schema.json
      required:
        - "@context"
        - "@type"
        - productIdentity
        - principalRange
        - tenor
        - costOfFund
        - repaymentSchedule
        - borrowerCriteria
        - regulatoryDeclaration
        - requiredDocuments
      properties:
        "@context":
          type: string
          example: "https://schema.ion.id/finance/resource/v1/context.jsonld"
        "@type":
          type: string
          enum: ["ion:CreditProduct"]
        crc:
          type: string
          description: ION Catalogue Resource Category — always FNC-lending for credit products
          enum: ["FNC-lending"]
          example: "FNC-lending"
        productIdentity:
          $ref: '#/components/schemas/ProductIdentity'
        principalRange:
          $ref: '#/components/schemas/PrincipalRange'
        tenor:
          $ref: '#/components/schemas/Tenor'
        costOfFund:
          $ref: '#/components/schemas/CostOfFundMechanism'
        repaymentSchedule:
          $ref: '#/components/schemas/RepaymentSchedule'
        feeStructure:
          $ref: '#/components/schemas/FeeStructure'
        collateral:
          $ref: '#/components/schemas/Collateral'
        borrowerCriteria:
          $ref: '#/components/schemas/BorrowerCriteria'
        regulatoryDeclaration:
          $ref: '#/components/schemas/RegulatoryDeclaration'
        requiredDocuments:
          type: array
          items:
            $ref: '#/components/schemas/RequiredDocument'
          description: Checklist of documents required from the borrower
        islamicFinance:
          $ref: '#/components/schemas/IslamicFinanceStructure'
          description: Present only when productIdentity.financeType = ISLAMIC
        governmentProgram:
          $ref: '#/components/schemas/GovernmentProgram'
          description: Present for government programs (KUR, FLPP, UMi, BPUM)
        paylaterService:
          $ref: '#/components/schemas/PaylaterService'
          description: Present only for productType = PAYLATER or BNPL

    ProductIdentity:
      type: object
      description: Product identity, classification, and provider information
      required: [productName, institutionName, productType, financeType, currency, institutionType]
      properties:
        productName:
          type: string
          example: "KTA BRI"
        institutionName:
          type: string
          example: "PT Bank Rakyat Indonesia (Persero) Tbk"
        productType:
          type: string
          enum: [KPR, KPA, KKB, KTA, CREDIT_CARD, PAYLATER, MULTIPURPOSE_LOAN, CASH_ADVANCE,
                 KUR_SUPER_MIKRO, KUR_MIKRO, KUR_KECIL, KUR_TKI, WORKING_CAPITAL,
                 INVESTMENT_LOAN, MICRO_BUSINESS_LOAN, INVOICE_FINANCING, SUPPLY_CHAIN_FINANCE,
                 LINKAGE, P2P_PRODUCTIVE, P2P_CONSUMER, KPR_SYARIAH, KKB_SYARIAH,
                 ISLAMIC_BUSINESS, RAHN, QARDH_HASAN, FLPP, TAPERA, BPUM, UMI,
                 ALSINTAN, CONVENTIONAL_PAWN, OTHER]
          example: "KTA"
        financeType:
          type: string
          enum: [CONVENTIONAL, ISLAMIC]
          example: "CONVENTIONAL"
        currency:
          type: string
          enum: [IDR, USD, SGD, EUR]
          default: "IDR"
        institutionType:
          type: string
          enum: [BANK_UMUM, BPR, BPRS, PERUSAHAAN_PEMBIAYAAN, KOPERASI_SIMPAN_PINJAM,
                 P2P_LENDING, PEGADAIAN, BMT, MODAL_VENTURA, LEMBAGA_KEUANGAN_MIKRO]
          example: "BANK_UMUM"
        bankCapitalTier:
          type: string
          enum: [BUKU_1, BUKU_2, BUKU_3, BUKU_4]
        digitalOnly:
          type: boolean
          default: false
        distributionChannels:
          type: array
          items:
            type: string
            enum: [BRANCH_OFFICE, MOBILE_BANKING, INTERNET_BANKING,
                   BRANCHLESS_BANKING_AGENT, FINANCIAL_MARKETPLACE,
                   WHATSAPP_BANKING, DIRECT_API, FIELD_SALES_AGENT]

    MonetaryAmount:
      type: object
      description: Reusable monetary amount with value and ISO 4217 currency
      required: [value, currency]
      properties:
        value:
          type: number
          minimum: 0
          example: 50000000
        currency:
          type: string
          default: IDR
          example: "IDR"

    PrincipalRange:
      type: object
      description: Loan/financing principal amount range
      required: [minimum, maximum]
      properties:
        minimum:
          $ref: '#/components/schemas/MonetaryAmount'
          description: Minimum principal offered
        maximum:
          $ref: '#/components/schemas/MonetaryAmount'
          description: Maximum principal offered
        maximumKUROfficial:
          type: number
          description: Official KUR program cap per government regulation
          example: 100000000
        denomination:
          type: number
          description: Allowed amount must be a multiple of this value
          example: 500000

    Tenor:
      type: object
      description: Loan or financing tenure (maturity) range
      required: [unit, minimum, maximum]
      properties:
        unit:
          type: string
          enum: [DAYS, MONTHS, YEARS]
          example: "MONTHS"
        minimum:
          type: integer
          minimum: 1
          example: 12
        maximum:
          type: integer
          minimum: 1
          example: 60
        availableTenors:
          type: array
          items: { type: integer }
          example: [3, 6, 12, 24, 36, 48, 60]

    CostOfFundMechanism:
      type: object
      description: Interest mechanics (conventional) or profit mechanics (Islamic)
      required: [yieldType]
      properties:
        yieldType:
          type: string
          enum: [FIXED, FLOATING, COMBINED, MARGIN, NISBAH, UJRAH, ZERO_COST]
          example: "FIXED"
        calculationMethod:
          type: string
          enum: [ANNUITY, FLAT, EFFECTIVE, DECLINING_BALANCE]
          example: "FLAT"
        rateMinPercent: { type: number, example: 10.5 }
        rateMaxPercent: { type: number, example: 24.0 }
        rateReference:
          type: string
          enum: [BI_RATE, JIBOR, SOFR, SBDK, PRIME_RATE]
          example: "BI_RATE"
        spreadPercent:
          type: number
          description: Spread above benchmark for floating products (% p.a.)
          example: 3.5
        fixedPeriodYears:
          type: integer
          description: For COMBINED — fixed-rate period in years before switching to floating
          example: 3
        governmentSubsidyPercent:
          type: number
          description: Government interest subsidy (% p.a.) deducted from bank's market rate
          example: 10.5
        effectiveRatePercent:
          type: number
          description: Final rate paid by borrower after government subsidy
          example: 6.0
        creditCardMonthlyRatePercent:
          type: number
          description: Monthly revolving interest rate for credit card products (%)
          example: 1.75

    RepaymentSchedule:
      type: object
      description: Repayment schedule, frequency, and accepted payment channels
      required: [frequency, paymentChannels]
      properties:
        frequency:
          type: string
          enum: [DAILY, WEEKLY, BIWEEKLY, MONTHLY, QUARTERLY, SEMIANNUAL, ANNUAL, BULLET, SEASONAL]
          example: "MONTHLY"
        paymentChannels:
          type: array
          items:
            type: string
            enum: [AUTODEBIT, VIRTUAL_ACCOUNT, MOBILE_BANKING, INTERNET_BANKING, ATM,
                   BANK_TELLER, BIFAST, RTGS, KLIRING, QRIS, GOPAY, OVO, DANA, LINKAJA,
                   SHOPEEPAY, SAKUKU, ALFAMART, INDOMARET]
          example: ["AUTODEBIT", "VIRTUAL_ACCOUNT", "QRIS", "BIFAST"]
        gracePeriodDays:
          type: integer
          minimum: 0
          default: 0
          example: 3
        earlySettlementAllowed:
          type: boolean
          default: true
        earlySettlementPenalty:
          type: boolean
          default: false
        restructuringAllowed:
          type: boolean
          default: true
        seasonalArrangement:
          type: string
          example: "Principal repaid after harvest; interest paid monthly"

    FeeStructure:
      type: object
      description: All fees and charges associated with this credit product
      properties:
        provisionFeePercent:
          type: number
          minimum: 0
          example: 1.0
        administrationFeeIDR:
          type: number
          minimum: 0
          example: 200000
        appraisalFeeIDR:
          type: number
          minimum: 0
          example: 500000
        notaryFeeIDR:
          type: number
          minimum: 0
          example: 3000000
        insurancePremiumPercent:
          type: number
          minimum: 0
          example: 0.35
        mandatoryInsurance:
          type: boolean
          default: false
        mandatoryInsuranceTypes:
          type: array
          items:
            type: string
            enum: [LIFE_INSURANCE, CREDIT_INSURANCE, FIRE_INSURANCE, VEHICLE_INSURANCE,
                   EMPLOYMENT_INSURANCE, PROPERTY_INSURANCE, BUSINESS_INSURANCE]
          example: ["LIFE_INSURANCE", "FIRE_INSURANCE"]
        latePenaltyPercentPerDay:
          type: number
          minimum: 0
          example: 0.1
        prepaymentPenaltyPercent:
          type: number
          minimum: 0
          example: 1.0
        stampDutyIDR:
          type: integer
          default: 10000
          example: 10000
        maxTotalCostPercent:
          type: number
          description: All-in cost cap as % of principal (APR equivalent per POJK 6/2022)
          example: 24.0

    Collateral:
      type: object
      description: Collateral and security requirements
      required: [required]
      properties:
        required:
          type: boolean
          example: true
        collateralTypes:
          type: array
          items:
            type: string
            enum: [UNSECURED, PROPERTY, APARTMENT, MOTOR_VEHICLE_CAR, MOTOR_VEHICLE_MOTORCYCLE,
                   GOLD, FIXED_DEPOSIT, LISTED_SHARES, GOVERNMENT_BONDS, TRADE_RECEIVABLES,
                   INVENTORY, MACHINERY_AND_EQUIPMENT, VESSEL, AIRCRAFT, RIGHTS_OF_CLAIM,
                   PERSONAL_GUARANTOR, CORPORATE_GUARANTOR, GOVERNMENT_GUARANTOR]
          example: ["PROPERTY"]
        maxLTVPercent:
          type: number
          minimum: 0
          maximum: 100
          example: 80.0
        appraisalRequired:
          type: boolean
          default: false
        guarantorInstitution:
          type: string
          enum: [JAMKRINDO, ASKRINDO, JAMKRIDA, PERUM_JAMKRINDO]
          example: "JAMKRINDO"

    BorrowerCriteria:
      type: object
      description: Borrower eligibility and qualification criteria
      required: [applicantTypes]
      properties:
        applicantTypes:
          type: array
          items:
            type: string
            enum: [INDIVIDUAL, MARRIED_COUPLE, MICRO_ENTERPRISE, SMALL_ENTERPRISE,
                   MEDIUM_ENTERPRISE, CORPORATION, COOPERATIVE, FOUNDATION,
                   STATE_OWNED_ENTERPRISE, REGIONAL_STATE_ENTERPRISE]
          example: ["INDIVIDUAL"]
        minimumAge:
          type: integer
          minimum: 17
          example: 21
        maximumAgeAtMaturity:
          type: integer
          maximum: 80
          example: 65
        minimumMonthlyIncomeIDR:
          type: number
          minimum: 0
          example: 3000000
        minimumSLIKGrade:
          type: integer
          minimum: 1
          maximum: 5
          example: 1
        requiredCollectibilityGrade:
          type: integer
          enum: [1, 2]
          default: 1
        employmentTypes:
          type: array
          items:
            type: string
            enum: [CIVIL_SERVANT, MILITARY, POLICE, PERMANENT_EMPLOYEE, CONTRACT_EMPLOYEE,
                   SELF_EMPLOYED, PROFESSIONAL, FARMER, FISHERMAN, LIVESTOCK_BREEDER,
                   PENSIONER, STUDENT, HOMEMAKER, TRADER, RIDEHAILING_DRIVER]
          example: ["CIVIL_SERVANT", "PERMANENT_EMPLOYEE", "SELF_EMPLOYED", "PROFESSIONAL"]
        citizenship:
          type: array
          items:
            type: string
            enum: [NATIONAL_CITIZEN, FOREIGN_KITAS, FOREIGN_KITAP, LEGAL_ENTITY, FOREIGN_LEGAL_ENTITY]
          example: ["NATIONAL_CITIZEN"]
        serviceRegions:
          type: array
          description: ISO 3166-2:ID provinces. NATIONAL = all 38 provinces.
          items:
            type: string
            enum: [NATIONAL, ID-AC, ID-BA, ID-BB, ID-BE, ID-GO, ID-JA, ID-JB, ID-JI, ID-JK,
                   ID-JT, ID-KB, ID-KI, ID-KR, ID-KS, ID-KT, ID-KU, ID-LA, ID-MA, ID-MU,
                   ID-NB, ID-NT, ID-PA, ID-PB, ID-PD, ID-PS, ID-PT, ID-RI, ID-SA, ID-SB,
                   ID-SG, ID-SN, ID-SR, ID-SS, ID-ST, ID-SU, ID-YO]
          example: ["NATIONAL"]
        maxDSRPercent:
          type: number
          minimum: 0
          maximum: 100
          example: 70.0
        cleanCreditHistoryRequired:
          type: boolean
          default: false

    RegulatoryDeclaration:
      type: object
      description: OJK/BI license declarations, required disclosures, and consumer protection
      required: [licenses]
      properties:
        licenses:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/License'
        disclosures:
          type: array
          items:
            $ref: '#/components/schemas/Disclosure'
        complaintService:
          $ref: '#/components/schemas/ComplaintService'
        privacyPolicyUrl:
          type: string
          format: uri

    License:
      type: object
      description: Single regulatory license / registration record
      required: [regulatoryBody, licenseNumber, role]
      properties:
        regulatoryBody:
          type: string
          enum: [OJK_BANK_UMUM, OJK_BPR, OJK_BPRS, OJK_PERUSAHAAN_PEMBIAYAAN, OJK_P2P_LENDING,
                 OJK_MODAL_VENTURA, OJK_LKM, BI_SISTEM_PEMBAYARAN, KEMENKOP_KOPERASI,
                 DSN_MUI, AFPI, APPI]
          example: "OJK_BANK_UMUM"
        licenseNumber:
          type: string
          example: "KEP-046/DIR/1992"
        role:
          type: string
          enum: [DIRECT_LENDER, KUR_CHANNEL_BANK, DISTRIBUTION_PARTNER, MARKETING_AGENT,
                 LOAN_SERVICE_PROVIDER, GUARANTOR]
          example: "DIRECT_LENDER"
        verificationUrl:
          type: string
          format: uri

    Disclosure:
      type: object
      description: Required disclosure document reference
      required: [disclosureType, url]
      properties:
        disclosureType:
          type: string
          enum: [PRODUCT_SUMMARY, INSTALLMENT_SIMULATOR, TERMS_AND_CONDITIONS, PRIVACY_POLICY,
                 COMPLAINT_PROCEDURE, DISPUTE_RESOLUTION, REGULATORY_REFERENCE, DSN_MUI_FATWA,
                 SLIK_CONSENT_FORM]
          example: "PRODUCT_SUMMARY"
        url:
          type: string
          format: uri
        language:
          type: string
          default: "id"
          enum: ["id", "en"]

    ComplaintService:
      type: object
      description: Customer complaint contacts per POJK 6/2022
      properties:
        tollFreePhone:
          type: string
          example: "1500017"
        email:
          type: string
          format: email
          example: "callcenter@bri.co.id"
        complaintUrl:
          type: string
          format: uri
        ojkConsumerPortal:
          type: string
          format: uri
          default: "https://konsumen.ojk.go.id"

    RequiredDocument:
      type: object
      description: A single document required for the credit application
      required: [documentType, mandatory]
      properties:
        documentType:
          type: string
          enum: [KTP, KK, PASPOR, KITAS, KITAP, BUKU_NIKAH, AKTA_CERAI, AKTA_KEMATIAN,
                 SLIP_GAJI, SK_PENGANGKATAN, SURAT_KONTRAK_KERJA, SURAT_KETERANGAN_KERJA,
                 ID_CARD_PEGAWAI, NPWP, SPT_TAHUNAN_PPH, REKENING_KORAN, LAPORAN_KEUANGAN,
                 LAPORAN_LABA_RUGI, NERACA_KEUANGAN, CASHFLOW, NIB, SIUP, SKDU,
                 AKTA_PENDIRIAN, AKTA_PERUBAHAN, SK_KEMENKUMHAM, SURAT_IZIN_USAHA,
                 SHM, SHGB, SHP, BPKB, STNK, IMB_PBG, PBB_TERAKHIR, FOTO_AGUNAN,
                 FOTO_USAHA, SLIK_CONSENT, DATA_SLIK_IDEB, INVOICE_TAGIHAN,
                 PURCHASE_ORDER, KONTRAK_PENJUALAN, SERTIFIKAT_HALAL, AKAD_SYARIAH_DRAFT,
                 SURAT_PERNYATAAN_KUR, SURAT_BELUM_DAPAT_KUR, SKU_DESA]
          example: "KTP"
        mandatory:
          type: boolean
          example: true
        issuer:
          type: string
          example: "DUKCAPIL / Disdukcapil"
        digitalVerification:
          type: boolean
          default: false
        notes:
          type: string

    IslamicFinanceStructure:
      type: object
      description: Islamic finance akad details. Present only when financeType = ISLAMIC.
      required: [contractType, dsnMuiFatwaNumber]
      properties:
        contractType:
          type: string
          enum: [MURABAHAH, MUSHARAKAH_MUTANAQISAH, MUDHARABAH, MUSHARAKAH, IJARAH,
                 IJARAH_MUNTAHIA_BITTAMLIK, ISTISHNA, SALAM, QARDH, RAHN,
                 WAKALAH_BIL_ISTITHMAR, KAFALAH, HIWALAH]
          example: "MURABAHAH"
        dsnMuiFatwaNumber:
          type: string
          example: "DSN-MUI/IV/2000 No. 04"
        marginPercentPerYear:
          type: number
          example: 9.5
        bankProfitSharePercent:
          type: number
          minimum: 0
          maximum: 100
          example: 70
        customerProfitSharePercent:
          type: number
          minimum: 0
          maximum: 100
          example: 30
        annualUjrahIDR:
          type: number
          example: 6000000
        shariahBoardSupervision:
          type: object
          properties:
            chairmanName: { type: string }
            dsnMuiCertNumber: { type: string }
        halalCertified:
          type: boolean
          default: true

    GovernmentProgram:
      type: object
      description: Government subsidy and support program details (KUR, FLPP, UMi, BPUM)
      required: [programType]
      properties:
        programType:
          type: string
          enum: [KUR_SUPER_MIKRO, KUR_MIKRO, KUR_KECIL, KUR_TKI, FLPP, TAPERA, BPUM, UMI,
                 ALSINTAN, GERAK_UMi]
          example: "KUR_MIKRO"
        responsibleMinistry:
          type: string
          example: "Kementerian Koordinator Bidang Perekonomian"
        subsidyPercent:
          type: number
          example: 10.5
        effectiveRatePercent:
          type: number
          example: 6.0
        targetBusinessSectors:
          type: array
          items:
            type: string
            enum: [AGRICULTURE, FISHERIES, LIVESTOCK, FORESTRY, MANUFACTURING, TRADE,
                   GENERAL_SERVICES, TOURISM, CONSTRUCTION, TRANSPORTATION, EDUCATION,
                   HEALTHCARE, ALL_SECTORS]
          example: ["TRADE", "AGRICULTURE", "GENERAL_SERVICES"]
        authorizedDistributingBanks:
          type: array
          items: { type: string }
          example: ["BRI", "BNI", "Bank Mandiri", "BSI"]
        officialGuarantorInstitution:
          type: string
          enum: [JAMKRINDO, ASKRINDO, JAMKRIDA, PERUM_JAMKRINDO]
          example: "JAMKRINDO"
        specialRequirements:
          type: array
          items: { type: string }
        regulatoryReference:
          type: string
          example: "Permenko Perekonomian No. 1 Tahun 2023 tentang Pedoman KUR"

    PaylaterService:
      type: object
      description: Buy-Now-Pay-Later and Paylater specific attributes
      properties:
        maxCreditLimitIDR:
          type: number
          example: 20000000
        maxTransactionIDR:
          type: number
          example: 10000000
        billingCycle:
          type: string
          enum: [FIXED_INSTALLMENT, MONTHLY_BILLING]
          example: "FIXED_INSTALLMENT"
        interestFreePeriodDays:
          type: integer
          example: 30
        availableInstallmentTenors:
          type: array
          items: { type: integer }
          example: [3, 6, 12, 24]
        merchantCategories:
          type: array
          items:
            type: string
            enum: [E_COMMERCE, FASHION_RETAIL, ELECTRONICS, HEALTH_PHARMACY, EDUCATION,
                   TRAVEL_TOURISM, FOOD_BEVERAGE, AUTOMOTIVE, HOME_FURNITURE, ENTERTAINMENT,
                   ALL_MERCHANTS]
          example: ["E_COMMERCE", "ALL_MERCHANTS"]
        integratedPlatforms:
          type: array
          items: { type: string }
          example: ["Tokopedia", "Shopee", "Lazada", "Bukalapak", "Blibli"]
        usesInternalCreditScore:
          type: boolean
          default: false

    # ── CREDIT OFFER (ion:CreditApproval) ─────────────────────────────────────────
    CreditApproval:
      type: object
      description: >
        `ion:CreditApproval` — Per-applicant credit offer with exact approved terms.
        Placed in `contract.commitments[].offer.offerAttributes` in `on_select`.
        Full schema: https://schema.ion.id/finance/offer/v1/schema.json
      required: ["@context", "@type", offerReference, validUntil, offerStatus,
                 approvedPrincipal, approvedTenor, effectiveRate, monthlyInstallment, totalFees]
      properties:
        "@context":
          type: string
          example: "https://schema.ion.id/finance/offer/v1/context.jsonld"
        "@type":
          type: string
          enum: ["ion:CreditApproval"]
        offerReference:
          type: string
          example: "BMTAP-KTA-2024-05-10-04421"
        validUntil:
          type: string
          format: date-time
          example: "2024-06-09T23:59:59+07:00"
        offerStatus:
          type: string
          enum: [UNDER_EVALUATION, APPROVED, CONDITIONALLY_APPROVED, REJECTED, EXPIRED]
          example: "APPROVED"
        approvedPrincipal:
          type: object
          required: [value, currency]
          properties:
            value: { type: number, example: 50000000 }
            currency: { type: string, default: "IDR" }
        approvedTenor:
          type: object
          required: [value, unit]
          properties:
            value: { type: integer, example: 48 }
            unit: { type: string, enum: [DAYS, MONTHS, YEARS], example: "MONTHS" }
        effectiveRate:
          type: object
          required: [percentPerYear, method]
          properties:
            percentPerYear: { type: number, example: 9.5 }
            method: { type: string, enum: [ANNUITY, FLAT, EFFECTIVE], example: "FLAT" }
            yieldType: { type: string, enum: [FIXED, FLOATING, COMBINED, MARGIN, NISBAH] }
            fixedPeriodYears: { type: integer }
            floatingRateAfterFixedPercent: { type: number }
        monthlyInstallment:
          type: object
          properties:
            totalIDR: { type: number, example: 1437500 }
            principalIDR: { type: number, example: 1041667 }
            interestIDR: { type: number, example: 395833 }
        totalFees:
          type: object
          properties:
            provisionFeeIDR: { type: number, example: 500000 }
            administrationFeeIDR: { type: number, example: 250000 }
            appraisalFeeIDR: { type: number, example: 0 }
            insurancePremiumIDR: { type: number }
        aprEquivalent:
          type: number
          description: Annualised Percentage Rate (APR) equivalent for consumer disclosure (POJK 6/2022)
          example: 18.98
        disbursableAmount:
          type: object
          properties:
            value: { type: number, example: 49250000 }
            currency: { type: string, default: "IDR" }
        additionalConditions:
          type: array
          description: Conditions to be met (for CONDITIONALLY_APPROVED) or rejection reasons
          items: { type: string }

    # ── CREDIT CONTRACT (ion:LoanAgreement) ───────────────────────────────────
    LoanAgreement:
      type: object
      description: >
        `ion:LoanAgreement` — Signed loan agreement attributes.
        Placed in `contract.contractAttributes` in `on_confirm` and `on_status`.
        Full schema: https://schema.ion.id/finance/contract/v1/schema.json
      required: ["@context", "@type", contractNumber, loanAccountNumber, agreementDate, loanTerms, legalDocuments]
      properties:
        "@context":
          type: string
          example: "https://schema.ion.id/finance/contract/v1/context.jsonld"
        "@type":
          type: string
          enum: ["ion:LoanAgreement"]
        contractNumber:
          type: string
          description: Perjanjian Kredit / Akad Pembiayaan number (primary key in core banking)
          example: "PKS-BMTAP-KTA-2024-00442"
        loanAccountNumber:
          type: string
          description: Loan account number for payment reconciliation and SLIK reporting
          example: "100200334455667"
        agreementDate:
          type: string
          format: date
          description: Akad Kredit signing date (ISO 8601)
          example: "2024-05-15"
        maturityDate:
          type: string
          format: date
          example: "2028-05-15"
        loanStatus:
          type: string
          description: OJK SLIK collectibility grade (domain-level, separate from Beckn contract.status)
          enum: [ACTIVE, SPECIAL_MENTION, SUBSTANDARD, DOUBTFUL, LOSS, SETTLED, RESTRUCTURED]
          default: "ACTIVE"
        loanTerms:
          type: object
          description: Core loan terms frozen at akad signing — immutable unless restructured
          required: [principalAmount, currency, approvedTenorMonths, interestRatePercentPA, calculationMethod]
          properties:
            principalAmount: { type: number, example: 50000000 }
            currency: { type: string, default: "IDR" }
            approvedTenorMonths: { type: integer, example: 48 }
            interestRatePercentPA: { type: number, example: 9.5 }
            calculationMethod: { type: string, enum: [ANNUITY, FLAT, EFFECTIVE] }
            yieldType: { type: string, enum: [FIXED, FLOATING, COMBINED, MARGIN, NISBAH] }
            monthlyInstallmentIDR: { type: number, example: 1437500 }
            firstInstallmentDate: { type: string, format: date }
        legalDocuments:
          type: object
          description: Legal document references retained per POJK 6/2022
          properties:
            signedAkadUrl: { type: string, format: uri }
            eMeteraiSerial: { type: string }
            riplayCopyUrl: { type: string, format: uri }
            collateralRegistrationRef: { type: string }
            notarialDeedRef: { type: string }

    # ── BORROWER (ion:Borrower) ───────────────────────────────────────────────
    BorrowerAttributes:
      type: object
      description: >
        `ion:Borrower` — Borrower identity placed in
        `contract.participants[].participantAttributes` with descriptor.code = "BORROWER".
        Full schema: https://schema.ion.id/finance/participant/v1/schema.json
      required: ["@context", "@type", fullName, nik]
      properties:
        "@context":
          type: string
          example: "https://schema.ion.id/finance/participant/v1/context.jsonld"
        "@type":
          type: string
          enum: ["ion:Borrower"]
        fullName:
          type: string
          description: Full legal name as printed on the National ID
          example: "Rini Ariani"
        nik:
          type: string
          pattern: "^[0-9]{16}$"
          description: 16-digit National ID number
          example: "3578025505870003"
        npwp:
          type: string
          description: Tax Identification Number
          example: "55.432.198.7-611.000"
        birthPlace: { type: string, example: "Surabaya" }
        birthDate: { type: string, format: date, example: "1987-05-15" }
        registeredAddress: { type: string }
        email: { type: string, format: email }
        phone: { type: string, example: "+6281312345678" }
        employmentType:
          type: string
          enum: [SALARIED, CIVIL_SERVANT, MILITARY, POLICE, PENSIONER, SELF_EMPLOYED,
                 ENTREPRENEUR, FARMER, FISHERMAN, INFORMAL_WORKER, UNEMPLOYED]


    # ── LENDER (ion:Lender) ───────────────────────────────────────────────────
    LenderAttributes:
      type: object
      description: >
        `ion:Lender` — Lender institution identity placed in
        `contract.participants[].participantAttributes` with descriptor.code = "LENDER".
        Full schema: https://schema.ion.id/finance/participant/v1/schema.json
      required: ["@context", "@type", institutionName, ojkLicenseNumber]
      properties:
        "@context":
          type: string
          example: "https://schema.ion.id/finance/participant/v1/context.jsonld"
        "@type":
          type: string
          enum: ["ion:Lender"]
        institutionName:
          type: string
          description: Official registered name of the lending institution
          example: "PT Bank Mandiri Taspen (Persero)"
        ojkLicenseNumber:
          type: string
          description: OJK operating license number
          example: "KEP-42/D.05/2016"
        branchName:
          type: string
          example: "Kantor Cabang Surabaya Darmo"
        branchCode:
          type: string
          example: "SBY-001"
        relationshipManagerName:
          type: string
          example: "Budi Santoso"
        relationshipManagerPhone:
          type: string
          example: "+628123456789"

    # ── AMORTISATION ROW (ion:AmortisationRow) ───────────────────────────────
    AmortisationRow:
      type: object
      description: >
        `ion:AmortisationRow` — Single instalment row in the amortisation schedule.
        Placed in `settlement.settlementAttributes` in `/on_status` and `/on_update`.
        Full schema: https://schema.ion.id/finance/settlement/v1/schema.json
      required: ["@context", "@type", installmentSequence, dueDate, totalInstallmentIDR, paymentStatus]
      properties:
        "@context":
          type: string
          example: "https://schema.ion.id/finance/settlement/v1/context.jsonld"
        "@type":
          type: string
          enum: ["ion:AmortisationRow"]
        installmentSequence:
          type: integer
          description: 1-based instalment sequence number
          example: 1
        dueDate:
          type: string
          format: date
          example: "2024-06-15"
        totalInstallmentIDR:
          type: number
          example: 1437500
        principalComponentIDR:
          type: number
          example: 1041667
        interestComponentIDR:
          type: number
          example: 395833
        outstandingPrincipalIDR:
          type: number
          example: 48958333
        paymentStatus:
          type: string
          enum: [UNPAID, PAID, OVERDUE, PARTIAL]
          example: "UNPAID"
        actualPaymentDate:
          type: string
          format: date

    # ── DISBURSEMENT PERFORMANCE (ion:DisbursementPerformance) ───────────────
    DisbursementPerformance:
      type: object
      description: >
        `ion:DisbursementPerformance` — Loan disbursement execution record.
        Placed in `fulfillment.performanceAttributes` in `/on_confirm` and `/on_track`.
        Full schema: https://schema.ion.id/finance/performance/v1/schema.json
      required: ["@context", "@type", disbursementDate, disbursementMethod]
      properties:
        "@context":
          type: string
          example: "https://schema.ion.id/finance/performance/v1/context.jsonld"
        "@type":
          type: string
          enum: ["ion:DisbursementPerformance"]
        disbursementDate:
          type: string
          format: date
          example: "2024-05-15"
        targetSLABusinessDays:
          type: integer
          description: Target SLA in business days from akad signing to disbursement
          example: 3
        disbursementMethod:
          type: string
          enum: [BANK_TRANSFER, DEVELOPER_TRANSFER, DEALER_TRANSFER, CASH, VIRTUAL_ACCOUNT]
          example: "BANK_TRANSFER"
        disbursementBankName:
          type: string
          example: "BRI"
        disbursementAccountNumber:
          type: string
          example: "0019483756001"

    # ── LOAN CONSIDERATION (ion:LoanConsideration) ────────────────────────────
    LoanConsideration:
      type: object
      description: >
        `ion:LoanConsideration` — Monetary exchange under the loan contract.
        Placed in `consideration.considerationAttributes` in `/on_confirm`.
        Full schema: https://schema.ion.id/finance/consideration/v1/schema.json
      required: ["@context", "@type", approvedPrincipal, currency]
      properties:
        "@context":
          type: string
          example: "https://schema.ion.id/finance/consideration/v1/context.jsonld"
        "@type":
          type: string
          enum: ["ion:LoanConsideration"]
        approvedPrincipal:
          type: number
          description: Disbursed principal amount in IDR
          example: 50000000
        currency:
          type: string
          default: "IDR"
          example: "IDR"
        totalFeesIDR:
          type: number
          description: Total upfront fees in IDR (provision + administration + appraisal)
          example: 750000
        aprEquivalent:
          type: number
          description: Annualised Percentage Rate for POJK 6/2022 RIPLAY consumer disclosure
          example: 18.98

    # ── ACTION MESSAGE SCHEMAS ────────────────────────────────────────────────
    CatalogPublishAction:
      type: object
      required: [catalogs]
      properties:
        catalogs:
          type: array
          minItems: 1
          items:
            type: object
            required: [id, descriptor, provider, resources]
            properties:
              id: { type: string }
              descriptor:
                type: object
                properties:
                  name: { type: string }
                  shortDesc: { type: string }
              provider:
                type: object
                required: [id, descriptor]
                properties:
                  id: { type: string }
                  descriptor:
                    type: object
                    properties:
                      name: { type: string }
                      shortDesc: { type: string }
              resources:
                type: array
                items:
                  type: object
                  required: [id, descriptor, resourceAttributes]
                  properties:
                    id: { type: string }
                    descriptor:
                      type: object
                      properties:
                        name: { type: string }
                        shortDesc: { type: string }
                        longDesc: { type: string }
                    resourceAttributes:
                      $ref: '#/components/schemas/CreditProduct'

    CatalogOnPublishAction:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            type: object
            required: [catalogId, status]
            properties:
              catalogId: { type: string }
              status:
                type: string
                enum: [ACCEPTED, REJECTED, PENDING]
              indexedAt: { type: string, format: date-time }
              errors:
                type: array
                items:
                  type: object
                  properties:
                    code: { type: string }
                    message: { type: string }

    DiscoverAction:
      type: object
      required: [intent]
      properties:
        intent:
          type: object
          properties:
            item:
              type: object
              properties:
                descriptor:
                  type: object
                  properties:
                    name: { type: string }
                tags:
                  type: array
                  items:
                    $ref: '#/components/schemas/TagGroup'
            fulfillment:
              type: object
              properties:
                customer:
                  type: object
                  properties:
                    person:
                      type: object
                      properties:
                        tags:
                          type: array
                          items:
                            $ref: '#/components/schemas/TagGroup'
            provider:
              type: object
              properties:
                id: { type: string }
                descriptor:
                  type: object
                  properties:
                    name: { type: string }
        textSearch: { type: string }

    OnDiscoverAction:
      type: object
      required: [catalogs]
      properties:
        catalogs:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              descriptor:
                type: object
                properties:
                  name: { type: string }
                  shortDesc: { type: string }
              provider:
                type: object
                properties:
                  id: { type: string }
                  descriptor:
                    type: object
                    properties:
                      name: { type: string }
                      shortDesc: { type: string }
                      longDesc: { type: string }
              resources:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    descriptor:
                      type: object
                      properties:
                        name: { type: string }
                        shortDesc: { type: string }
                        longDesc: { type: string }
                    resourceAttributes:
                      $ref: '#/components/schemas/CreditProduct'

    SelectAction:
      type: object
      required: [contract]
      properties:
        contract:
          type: object
          properties:
            commitments:
              type: array
              items:
                type: object
                properties:
                  resources:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                  tags:
                    type: array
                    items:
                      $ref: '#/components/schemas/TagGroup'

    OnSelectAction:
      type: object
      required: [contract]
      properties:
        contract:
          type: object
          properties:
            id: { type: string }
            status:
              type: object
              properties:
                code: { type: string, enum: [DRAFT, ACTIVE, CANCELLED, COMPLETE] }
                name: { type: string }
            commitments:
              type: array
              items:
                type: object
                properties:
                  id: { type: string }
                  status:
                    type: object
                    properties:
                      descriptor:
                        type: object
                        properties:
                          code: { type: string }
                          name: { type: string }
                  resources:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        descriptor:
                          type: object
                          properties:
                            name: { type: string }
                            shortDesc: { type: string }
                  offer:
                    type: object
                    properties:
                      id: { type: string }
                      resourceIds:
                        type: array
                        items: { type: string }
                      validity:
                        type: object
                        properties:
                          endDate: { type: string, format: date-time }
                      offerAttributes:
                        $ref: '#/components/schemas/CreditApproval'

    InitAction:
      type: object
      required: [contract]
      properties:
        contract:
          type: object
          properties:
            id: { type: string }
            commitments:
              type: array
              items:
                type: object
                properties:
                  id: { type: string }
                  offer:
                    type: object
                    properties:
                      id: { type: string }
            participants:
              type: array
              description: Must include at least one participant with descriptor.code = "BORROWER"
              items:
                type: object
                properties:
                  id: { type: string }
                  descriptor:
                    type: object
                    properties:
                      name: { type: string }
                      code:
                        type: string
                        enum: [BORROWER, CO_BORROWER, GUARANTOR]
                  participantAttributes:
                    $ref: '#/components/schemas/BorrowerAttributes'

    OnInitAction:
      type: object
      required: [contract]
      properties:
        contract:
          type: object
          properties:
            id: { type: string }
            status:
              type: object
              properties:
                code: { type: string }
                name: { type: string }
            payments:
              type: array
              items:
                type: object
                properties:
                  id: { type: string }
                  type:
                    type: string
                    enum: [PRE_FULFILLMENT, ON_FULFILLMENT, POST_FULFILLMENT]
                  params:
                    type: object
                    properties:
                      accountNumber: { type: string }
                      bankCode: { type: string }
                      bankName: { type: string }
                      virtualAccountNumber: { type: string }
            tags:
              type: array
              description: Document checklist and pre-sanction terms
              items:
                $ref: '#/components/schemas/TagGroup'

    ConfirmAction:
      type: object
      required: [contract]
      properties:
        contract:
          type: object
          required: [id]
          properties:
            id: { type: string }
            payments:
              type: array
              items:
                type: object
                properties:
                  id: { type: string }
                  type: { type: string }
                  status:
                    type: string
                    enum: [NOT-PAID, PAID, PENDING]
                  params:
                    type: object
                    properties:
                      accountNumber: { type: string }
                      bankCode: { type: string }
            tags:
              type: array
              items:
                $ref: '#/components/schemas/TagGroup'

    OnConfirmAction:
      type: object
      required: [contract]
      properties:
        contract:
          type: object
          properties:
            id: { type: string }
            status:
              type: object
              properties:
                code: { type: string, enum: [ACTIVE] }
                name: { type: string }
            descriptor:
              type: object
              properties:
                name: { type: string }
                shortDesc: { type: string }
            commitments:
              type: array
              items:
                type: object
                properties:
                  id: { type: string }
                  status:
                    type: object
                    properties:
                      descriptor:
                        type: object
                        properties:
                          code: { type: string }
                          name: { type: string }
                  resources:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        descriptor:
                          type: object
                          properties:
                            name: { type: string }
                  offer:
                    type: object
                    properties:
                      id: { type: string }
                      resourceIds:
                        type: array
                        items: { type: string }
            contractAttributes:
              $ref: '#/components/schemas/LoanAgreement'
            participants:
              type: array
              items:
                type: object
                properties:
                  id: { type: string }
                  descriptor:
                    type: object
                    properties:
                      name: { type: string }
                      code: { type: string }
                  participantAttributes:
                    type: object
                    description: ion:Borrower or ion:Lender object depending on descriptor.code
                    additionalProperties: true
            settlements:
              type: array
              description: Amortisation schedule rows (cc:AmortisationRow)
              items:
                type: object
                properties:
                  id: { type: string }
                  settlementAttributes:
                    type: object
                    description: cc:AmortisationRow — instalment number, due date, amounts
                    additionalProperties: true
            performance:
              type: array
              description: Disbursement execution details (cc:DisbursementPerformance)
              items:
                type: object
                properties:
                  id: { type: string }
                  performanceAttributes:
                    type: object
                    description: cc:DisbursementPerformance — disbursement date, amount, account
                    additionalProperties: true

    StatusAction:
      type: object
      required: [contract]
      properties:
        contract:
          type: object
          required: [id]
          properties:
            id: { type: string }

    OnStatusAction:
      type: object
      required: [contract]
      properties:
        contract:
          type: object
          properties:
            id: { type: string }
            status:
              type: object
              properties:
                code: { type: string, enum: [DRAFT, ACTIVE, CANCELLED, COMPLETE] }
                name: { type: string }
            contractAttributes:
              $ref: '#/components/schemas/LoanAgreement'
            tags:
              type: array
              description: Extended status details (outstanding balance, next EMI, overdue)
              items:
                $ref: '#/components/schemas/TagGroup'

    UpdateAction:
      type: object
      required: [updateTarget, contract]
      properties:
        updateTarget:
          type: string
          enum: [contract, participants, settlements]
          description: The part of the contract being updated
        contract:
          type: object
          required: [id]
          properties:
            id: { type: string }
            participants:
              type: array
              items:
                type: object
                properties:
                  id: { type: string }
                  participantAttributes:
                    type: object
                    additionalProperties: true
            tags:
              type: array
              description: Update request parameters (updateType, amounts, documents)
              items:
                $ref: '#/components/schemas/TagGroup'

    OnUpdateAction:
      type: object
      required: [contract]
      properties:
        contract:
          type: object
          properties:
            id: { type: string }
            status:
              type: object
              properties:
                code: { type: string }
                name: { type: string }
            contractAttributes:
              $ref: '#/components/schemas/LoanAgreement'
            tags:
              type: array
              items:
                $ref: '#/components/schemas/TagGroup'

    CancelAction:
      type: object
      required: [contract]
      properties:
        contract:
          type: object
          required: [id]
          properties:
            id: { type: string }
            cancellationReasonId:
              type: string
              description: Cancellation reason code from the BPP's cancellation reason list
            descriptor:
              type: object
              properties:
                shortDesc: { type: string }

    OnCancelAction:
      type: object
      required: [contract]
      properties:
        contract:
          type: object
          properties:
            id: { type: string }
            status:
              type: object
              properties:
                code: { type: string, enum: [CANCELLED] }
                name: { type: string }
            contractAttributes:
              $ref: '#/components/schemas/LoanAgreement'
            tags:
              type: array
              description: Cancellation details (effective date, fees, refund)
              items:
                $ref: '#/components/schemas/TagGroup'

    TrackAction:
      type: object
      required: [contract]
      properties:
        contract:
          type: object
          required: [id]
          properties:
            id: { type: string }
            fulfillmentId:
              type: string
              description: ID of the specific fulfillment stage to track

    OnTrackAction:
      type: object
      required: [tracking]
      properties:
        tracking:
          type: object
          required: [id, status]
          properties:
            id:
              type: string
              description: Fulfillment / performance ID being tracked
            url:
              type: string
              format: uri
              description: URL to poll for real-time tracking updates
            status:
              type: string
              enum: [active, inactive]

    RateAction:
      type: object
      required: [ratings]
      properties:
        ratings:
          type: array
          minItems: 1
          items:
            type: object
            required: [id, ratingCategory, value]
            properties:
              id:
                type: string
                description: Contract ID, resource ID, or provider ID being rated
              ratingCategory:
                type: string
                enum: [Contract, Resource, Provider, Fulfillment, Agent]
              value:
                type: string
                description: Rating value 1–5
                pattern: "^[1-5]$"
              feedback:
                type: string
                description: Optional text feedback

    OnRateAction:
      type: object
      required: [ratings]
      properties:
        ratings:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              ratingCategory: { type: string }
              value: { type: string }
              aggregateRating: { type: number }
              feedbackForm:
                type: object
                properties:
                  url: { type: string, format: uri }
                  mimeType: { type: string }
                  required: { type: boolean }

    SupportAction:
      type: object
      required: [support]
      properties:
        support:
          type: object
          required: [refId, refType]
          properties:
            refId:
              type: string
              description: ID of the entity (contract, provider, resource) requiring support
            refType:
              type: string
              enum: [contract, resource, provider, agent, fulfillment]
              description: Type of entity being referenced
            issueType:
              type: string
              enum: [DOCUMENT_QUERY, EMI_QUERY, DISBURSEMENT_QUERY, PREPAYMENT_REQUEST,
                     RESTRUCTURE_REQUEST, GRIEVANCE, GENERAL, FRAUD_REPORT]
            description: { type: string }

    OnSupportAction:
      type: object
      required: [support]
      properties:
        support:
          type: object
          properties:
            refId: { type: string }
            ticketId: { type: string, description: "Support ticket reference number" }
            phone: { type: string, example: "14017" }
            email: { type: string, format: email }
            url: { type: string, format: uri }
            chatUrl: { type: string, format: uri }
            hours: { type: string, example: "24/7" }
            groContact:
              type: object
              description: Grievance Redressal Officer details (per POJK 18/2023)
              properties:
                name: { type: string }
                email: { type: string, format: email }
                regulatoryPortal: { type: string, format: uri }

  securitySchemes:
    BeckSignature:
      type: apiKey
      in: header
      name: Authorization
      description: >
        Beckn Ed25519 HTTP Signature. All requests and responses must be signed.
        The Ack response MUST carry a CounterSignature.
        Format: `Signature keyId="<subscriberId>|<keyId>|ed25519",
        algorithm="ed25519",created="<epoch>",expires="<epoch>",
        headers="(created) (expires) digest",signature="<base64>"`
        Keys must be registered at https://dedi.global.
