openapi: "3.0.0"
info:
  title: ION Finance Credit Domain API
  version: 2.0.0
  description: >
    **Beckn Protocol v2.0 — Credit Domain API Specification**

    Generic open-network API for credit and financing products.
    Implements all Beckn v2.0 protocol actions across the full loan lifecycle:
    catalog publication → discovery → selection → application → confirmation
    → servicing (status / update / cancel / track) → post-fulfillment (rate / support).

    **Domain:** `ion:finance`

    **ION Hierarchy:** `finance / FIN-02 / FNC-lending / loan-application / {variant}`
    Pattern IRI: `ion://flow/finance/FIN-02/FNC-lending/loan-application/v1`

    **Schema Pack:** Seven JSON-LD domain schema objects cover the full loan lifecycle:

    | Stage | Schema | Beckn Slot |
    |-------|--------|------------|
    | on_discover | `ion:CreditProduct` | `catalog.resources[].resourceAttributes` |
    | on_select   | `ion:CreditApproval`    | `contract.commitments[].offer.offerAttributes` |
    | on_confirm  | `ion:LoanAgreement` | `contract.contractAttributes` |
    | on_confirm  | `ion:Borrower` / `ion:Lender`  | `contract.participants[].participantAttributes` |
    | on_status   | `ion:AmortisationRow`          | `settlement.settlementAttributes` |
    | on_confirm  | `ion:DisbursementPerformance`  | `fulfillment.performanceAttributes` |
    | on_confirm  | `ion:LoanConsideration`        | `consideration.considerationAttributes` |

    **Schema context URIs:**
    - resource/v1: `https://schema.ion.id/finance/resource/v1/context.jsonld`
    - offer/v1: `https://schema.ion.id/finance/offer/v1/context.jsonld`
    - contract/v1: `https://schema.ion.id/finance/contract/v1/context.jsonld`
    - participant/v1: `https://schema.ion.id/finance/participant/v1/context.jsonld`
    - settlement/v1: `https://schema.ion.id/finance/settlement/v1/context.jsonld`
    - performance/v1: `https://schema.ion.id/finance/performance/v1/context.jsonld`
    - consideration/v1: `https://schema.ion.id/finance/consideration/v1/context.jsonld`

    **Flow:**
    ```
    BPP → CDS : /catalog/publish        BPP publishes CreditResource catalog
    CDS → BPP : /catalog/on_publish     async per-catalog indexing result

    BAP → BPP : /discover               BAP sends credit intent → ACK
    BPP → BAP : /on_discover            catalogs with ion:CreditProduct

    BAP → BPP : /select                 BAP selects resource + desired terms → ACK
    BPP → BAP : /on_select              contract.DRAFT with ion:CreditApproval

    BAP → BPP : /init                   BAP submits borrower KYC → ACK
    BPP → BAP : /on_init                finalized contract terms + payment schedule

    BAP → BPP : /confirm                BAP accepts terms, e-sign → ACK
    BPP → BAP : /on_confirm             contract.ACTIVE with ion:LoanAgreement

    BAP → BPP : /status                 poll loan status → ACK
    BPP → BAP : /on_status              current contract state + collectibility

    BAP → BPP : /update                 document upload / prepayment / restructure → ACK
    BPP → BAP : /on_update              updated contract terms

    BAP → BPP : /cancel                 withdraw application or foreclose → ACK
    BPP → BAP : /on_cancel              cancellation confirmation

    BAP → BPP : /track                  request disbursement tracking handle → ACK
    BPP → BAP : /on_track               tracking URL / webhook

    BAP → BPP : /rate                   submit experience rating → ACK
    BPP → BAP : /on_rate                rating confirmation

    BAP → BPP : /support                request support contact → ACK
    BPP → BAP : /on_support             support contacts + GRO details
    ```

    **Authentication:** All requests MUST carry a valid Beckn HTTP Signature in the
    `Authorization` header (Ed25519, registered in Beckn Registry / dedi.global).

    **Callback pattern:** All BAP→BPP calls return `ACK` immediately. The BPP then
    POSTs the actual response to the BAP's `context.bapUri` endpoint.

  contact:
    name: ION Network
    url: https://schema.ion.id
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

  x-beckn-version: "2.0.0"
  x-beckn-domain: "ion:finance"
  x-beckn-schema-pack: "https://schema.ion.id/finance/"
  x-beckn-registry: "https://dedi.global"

servers:
  - url: https://{subscriberUrl}
    description: >
      Base URL of the Beckn network participant (BAP or BPP).
      Replace `{subscriberUrl}` with the URL registered in the Beckn Registry.
    variables:
      subscriberUrl:
        default: example.beckn.io
        description: Registered subscriber URL from the Beckn Registry (dedi.global)

security:
  - BeckSignature: []

tags:
  - name: Catalog Publishing
    description: BPP publishes CreditResource catalog to Catalog Discovery Service (CDS)
  - name: Discovery
    description: BAP discovers credit products — async discover / on_discover flow
  - name: Transaction
    description: select / init / confirm — BAP selects, applies, and confirms credit
  - name: Fulfillment
    description: status / update / cancel / track — post-confirm loan servicing
  - name: Post-Fulfillment
    description: rate / support — ratings and grievance redressal

# ─────────────────────────────────────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────────────────────────────────────
paths:

  # ── CATALOG PUBLISH ──────────────────────────────────────────────────────
  /catalog/publish:
    post:
      operationId: catalogPublish
      tags: [Catalog Publishing]
      summary: BPP submits one or more CreditResource catalogs to the CDS for indexing
      description: >
        The BPP (lender's system) calls this endpoint to register or refresh its
        credit product catalog on the Beckn network. Each catalog entry wraps one
        or more `ion:CreditProduct` objects. Returns ACK immediately; per-catalog
        processing result arrives asynchronously via `/catalog/on_publish`.

        **Context.action:** `catalog/publish` or `catalog_publish`
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context'
                    - type: object
                      properties:
                        action:
                          type: string
                          enum: [catalog/publish, catalog_publish]
                message:
                  $ref: '#/components/schemas/CatalogPublishAction'
            example:
              context:
                version: "2.0.0"
                action: "catalog/publish"
                domain: "ion:finance"
                location: { country: { code: "ID" } }
                bapId: "cds.beckn.io"
                bapUri: "https://cds.beckn.io/beckn"
                bppId: "bri-bpp.co.id"
                bppUri: "https://api.bri.co.id/beckn"
                transactionId: "txn-a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                messageId: "msg-11112222-3333-4444-5555-666677778888"
                timestamp: "2024-05-01T08:00:00+07:00"
                ttl: "PT30S"
                schemaContext:
                  - "https://schema.ion.id/finance/resource/v1/context.jsonld"
              message:
                catalogs:
                  - id: "cat-bri-retail-credit-v1"
                    descriptor:
                      name: "BRI Retail Credit Products"
                      shortDesc: "BRI unsecured personal loans (KTA), home mortgages (KPR), and KUR"
                    provider:
                      id: "bri-bpp-001"
                      descriptor:
                        name: "PT Bank Rakyat Indonesia (Persero) Tbk"
                        shortDesc: "BUMN bank licensed by OJK — largest microfinance network in Indonesia"
                    resources:
                      - id: "bri-kta-v1"
                        descriptor:
                          name: "KTA BRI"
                          shortDesc: "Unsecured personal loan IDR 5jt–300jt, tenor 12–60 months"
                        resourceAttributes:
                          "@context": "https://schema.ion.id/finance/resource/v1/context.jsonld"
                          "@type": "ion:CreditProduct"
                          crc: "FNC-lending"
                          productIdentity:
                            productName: "KTA BRI"
                            institutionName: "PT Bank Rakyat Indonesia (Persero) Tbk"
                            productType: "KTA"
                            financeType: "CONVENTIONAL"
                            currency: "IDR"
                            institutionType: "BANK_UMUM"
                          principalRange:
                            minimum: { value: 5000000, currency: "IDR" }
                            maximum: { value: 300000000, currency: "IDR" }
                            denomination: 1000000
                          tenor:
                            unit: "MONTHS"
                            minimum: 12
                            maximum: 60
                          costOfFund:
                            yieldType: "FIXED"
                            calculationMethod: "FLAT"
                            rateMinPercent: 10.5
                            rateMaxPercent: 24.0
                          repaymentSchedule:
                            frequency: "MONTHLY"
                            paymentChannels: ["AUTODEBIT", "VIRTUAL_ACCOUNT", "BIFAST"]
                          borrowerCriteria:
                            applicantTypes: ["INDIVIDUAL"]
                            minimumAge: 21
                            maximumAgeAtMaturity: 60
                            minimumSLIKGrade: 1
                          regulatoryDeclaration:
                            licenses:
                              - regulatoryBody: "OJK_BANK_UMUM"
                                licenseNumber: "KEP-046/DIR/1992"
                                role: "DIRECT_LENDER"
                          requiredDocuments:
                            - documentType: "KTP"
                              mandatory: true
                            - documentType: "NPWP"
                              mandatory: true
                            - documentType: "SLIP_GAJI"
                              mandatory: true
      responses:
        '200':
          description: ACK — catalog accepted for processing; result follows via `/catalog/on_publish`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '409':
          $ref: '#/components/responses/AckNoCallback'
        '500':
          $ref: '#/components/responses/ServerError'

  /catalog/on_publish:
    post:
      operationId: catalogOnPublish
      tags: [Catalog Publishing]
      summary: CDS returns per-catalog indexing result to the BPP
      description: >
        Async callback from the Catalog Discovery Service (CDS) after processing
        the `/catalog/publish` request. Contains `ACCEPTED`, `REJECTED`, or `PENDING`
        status for each submitted catalog. The BPP confirms visibility by observing
        `ion:CreditProduct` items returned in subsequent `/on_discover` callbacks.
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context'
                    - type: object
                      properties:
                        action:
                          type: string
                          enum: [catalog/on_publish, on_catalog_publish]
                message:
                  $ref: '#/components/schemas/CatalogOnPublishAction'
            example:
              context:
                version: "2.0.0"
                action: "catalog/on_publish"
                domain: "ion:finance"
                bppId: "bri-bpp.co.id"
                bppUri: "https://api.bri.co.id/beckn"
                transactionId: "txn-a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                messageId: "msg-aaaabbbb-cccc-dddd-eeee-ffff00001111"
                timestamp: "2024-05-01T08:00:05+07:00"
                ttl: "PT30S"
              message:
                results:
                  - catalogId: "cat-bri-retail-credit-v1"
                    status: "ACCEPTED"
                    indexedAt: "2024-05-01T08:00:04+07:00"
      responses:
        '200':
          description: ACK from BPP — result received
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  # ── DISCOVERY ─────────────────────────────────────────────────────────────
  /discover:
    post:
      operationId: discover
      tags: [Discovery]
      summary: BAP sends a credit product discovery intent
      description: >
        The BAP sends a structured intent describing the borrower's credit need
        (product type, desired principal, tenure, location) to discover matching
        credit products on the Beckn network. Returns ACK immediately. The BPP or
        CDS delivers matching catalogs asynchronously via `/on_discover`.

        **Context.action:** `discover`
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context'
                    - type: object
                      properties:
                        action:
                          type: string
                          enum: [discover]
                message:
                  $ref: '#/components/schemas/DiscoverAction'
            example:
              context:
                version: "2.0.0"
                action: "discover"
                domain: "ion:finance"
                location: { country: { code: "ID" }, city: { code: "std:021" } }
                bapId: "superapp.id"
                bapUri: "https://superapp.id/beckn"
                transactionId: "txn-a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                messageId: "msg-22223333-4444-5555-6666-777788889999"
                timestamp: "2024-05-10T09:00:00+07:00"
                ttl: "PT30S"
                schemaContext:
                  - "https://schema.ion.id/finance/resource/v1/context.jsonld"
              message:
                intent:
                  item:
                    descriptor:
                      name: "KTA"
                    tags:
                      - descriptor: { code: "productType" }
                        list:
                          - descriptor: { code: "value" }
                            value: "KTA"
                  fulfillment:
                    customer:
                      person:
                        tags:
                          - descriptor: { code: "desiredPrincipal" }
                            list:
                              - descriptor: { code: "value" }
                                value: "50000000"
                              - descriptor: { code: "currency" }
                                value: "IDR"
                          - descriptor: { code: "desiredTenorMonths" }
                            list:
                              - descriptor: { code: "value" }
                                value: "48"
      responses:
        '200':
          description: ACK — discover request received; matching catalogs follow via `/on_discover`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '409':
          $ref: '#/components/responses/AckNoCallback'
        '500':
          $ref: '#/components/responses/ServerError'

  /on_discover:
    post:
      operationId: onDiscover
      tags: [Discovery]
      summary: BPP/CDS returns matching catalogs with CreditResource objects to the BAP
      description: >
        Async callback from BPP or CDS. Contains one or more catalogs whose
        `resources[].resourceAttributes` carry `ion:CreditProduct` objects
        describing available credit products. The BAP presents these to the
        borrower and calls `/select` on the chosen product.

        **Context.action:** `on_discover`

        **Schema placement:** `message.catalogs[].resources[].resourceAttributes`
        → `{ "@type": "ion:CreditProduct", ... }`
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context'
                    - type: object
                      properties:
                        action:
                          type: string
                          enum: [on_discover]
                message:
                  $ref: '#/components/schemas/OnDiscoverAction'
            example:
              context:
                version: "2.0.0"
                action: "on_discover"
                domain: "ion:finance"
                location: { country: { code: "ID" } }
                bapId: "superapp.id"
                bapUri: "https://superapp.id/beckn"
                bppId: "bmtap-gateway.co.id"
                bppUri: "https://bmtap-gateway.co.id/beckn"
                transactionId: "txn-a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                messageId: "msg-33334444-5555-6666-7777-888899990000"
                timestamp: "2024-05-10T09:00:02+07:00"
                ttl: "PT30S"
                schemaContext:
                  - "https://schema.ion.id/finance/resource/v1/context.jsonld"
              message:
                catalogs:
                  - id: "catalog-bmtap-retail-credit-2024"
                    descriptor:
                      name: "Bank Mandiri Taspen Pos — Produk Kredit"
                      shortDesc: "KTA khusus ASN/PNS/TNI/Polri/Pensiunan"
                    provider:
                      id: "bmtap-bpp-001"
                      descriptor:
                        name: "PT Bank Mandiri Taspen Pos"
                    resources:
                      - id: "bmtap-kta-pns-v1"
                        descriptor:
                          name: "KTA Mandiri Taspen"
                          shortDesc: "Kredit Tanpa Agunan khusus PNS — hingga IDR 350 jt, tenor s/d 120 bulan"
                        resourceAttributes:
                          "@context": "https://schema.ion.id/finance/resource/v1/context.jsonld"
                          "@type": "ion:CreditProduct"
                          crc: "FNC-lending"
                          productIdentity:
                            productName: "KTA Mandiri Taspen"
                            institutionName: "PT Bank Mandiri Taspen Pos"
                            productType: "KTA"
                            financeType: "CONVENTIONAL"
                            currency: "IDR"
                            institutionType: "BANK_UMUM"
                            bankCapitalTier: "BUKU_2"
                            digitalOnly: false
                            distributionChannels: ["BRANCH_OFFICE", "MOBILE_BANKING", "DIRECT_API"]
                          principalRange:
                            minimum: { value: 5000000, currency: "IDR" }
                            maximum: { value: 350000000, currency: "IDR" }
                            denomination: 1000000
                          tenor:
                            unit: "MONTHS"
                            minimum: 12
                            maximum: 120
                          costOfFund:
                            yieldType: "FIXED"
                            calculationMethod: "FLAT"
                            rateMinPercent: 6.99
                            rateMaxPercent: 13.5
                          repaymentSchedule:
                            frequency: "MONTHLY"
                            paymentChannels: ["AUTODEBIT", "VIRTUAL_ACCOUNT", "BIFAST"]
                          borrowerCriteria:
                            applicantTypes: ["INDIVIDUAL"]
                            minimumAge: 21
                            maximumAgeAtMaturity: 65
                            employmentTypes: ["CIVIL_SERVANT", "MILITARY", "POLICE", "PENSIONER"]
                            minimumSLIKGrade: 1
                          regulatoryDeclaration:
                            licenses:
                              - regulatoryBody: "OJK_BANK_UMUM"
                                licenseNumber: "KEP-67/DIR/1999"
                                role: "DIRECT_LENDER"
                          requiredDocuments:
                            - documentType: "KTP"
                              mandatory: true
                            - documentType: "SK_PENGANGKATAN"
                              mandatory: true
                            - documentType: "SLIP_GAJI"
                              mandatory: true
      responses:
        '200':
          description: ACK from BAP — catalog received
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  # ── TRANSACTION ───────────────────────────────────────────────────────────
  /select:
    post:
      operationId: select
      tags: [Transaction]
      summary: BAP selects a credit resource and requests a personalised CreditOffer
      description: >
        The BAP sends the borrower's chosen `resourceId` and desired loan parameters
        (principal, tenure). No PII is shared at this stage. The BPP evaluates
        the request and responds asynchronously via `/on_select` with a DRAFT
        contract containing a `ion:CreditApproval` object.

        **Context.action:** `select`

        **Contract model:** `message.contract` with `commitments[].resources[]`
        referencing the selected `ion:CreditProduct`.
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context'
                    - type: object
                      properties:
                        action:
                          type: string
                          enum: [select]
                message:
                  $ref: '#/components/schemas/SelectAction'
            example:
              context:
                version: "2.0.0"
                action: "select"
                domain: "ion:finance"
                bapId: "superapp.id"
                bapUri: "https://superapp.id/beckn"
                bppId: "bmtap-gateway.co.id"
                bppUri: "https://bmtap-gateway.co.id/beckn"
                transactionId: "txn-a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                messageId: "msg-44445555-6666-7777-8888-999900001111"
                timestamp: "2024-05-10T10:30:00+07:00"
                ttl: "PT30S"
              message:
                contract:
                  commitments:
                    - resources:
                        - id: "bmtap-kta-pns-v1"
                      tags:
                        - descriptor: { code: "loanParams" }
                          list:
                            - descriptor: { code: "desiredPrincipal" }
                              value: "50000000"
                            - descriptor: { code: "desiredTenorMonths" }
                              value: "48"
                            - descriptor: { code: "currency" }
                              value: "IDR"
      responses:
        '200':
          description: ACK — BPP acknowledged; CreditOffer follows via `/on_select`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '409':
          $ref: '#/components/responses/AckNoCallback'
        '500':
          $ref: '#/components/responses/ServerError'

  /on_select:
    post:
      operationId: onSelect
      tags: [Transaction]
      summary: BPP returns DRAFT contract with ion:CreditApproval (async callback)
      description: >
        The BPP evaluates the borrower's request against the product template
        and returns a DRAFT contract with `ion:CreditApproval` in
        `commitments[].offer.offerAttributes`. The offer contains the exact
        approved principal, tenure, rate, monthly installment, and fee breakdown.
        The BAP must call `/init` to proceed and submit borrower KYC.

        **Schema placement:** `message.contract.commitments[].offer.offerAttributes`
        → `{ "@type": "ion:CreditApproval", "offerStatus": "APPROVED"|"CONDITIONALLY_APPROVED", ... }`
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context'
                    - type: object
                      properties:
                        action:
                          type: string
                          enum: [on_select]
                message:
                  $ref: '#/components/schemas/OnSelectAction'
            example:
              context:
                version: "2.0.0"
                action: "on_select"
                domain: "ion:finance"
                bapId: "superapp.id"
                bapUri: "https://superapp.id/beckn"
                bppId: "bmtap-gateway.co.id"
                bppUri: "https://bmtap-gateway.co.id/beckn"
                transactionId: "txn-a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                messageId: "msg-55556666-7777-8888-9999-aaaabbbbcccc"
                timestamp: "2024-05-10T10:45:00+07:00"
                ttl: "PT30S"
                schemaContext:
                  - "https://schema.ion.id/finance/offer/v1/context.jsonld"
              message:
                contract:
                  id: "contract-draft-bmtap-kta-2024-05-10-04421"
                  status:
                    code: "DRAFT"
                    name: "KTA offer approved — awaiting borrower confirmation"
                  commitments:
                    - id: "commitment-bmtap-kta-04421"
                      status:
                        descriptor: { code: "ACTIVE", name: "KTA approved — no additional conditions" }
                      resources:
                        - id: "bmtap-kta-pns-v1"
                          descriptor: { name: "KTA Mandiri Taspen" }
                      offer:
                        id: "BMTAP-KTA-2024-05-10-04421"
                        resourceIds: ["bmtap-kta-pns-v1"]
                        validity:
                          endDate: "2024-06-09T23:59:59+07:00"
                        offerAttributes:
                          "@context": "https://schema.ion.id/finance/offer/v1/context.jsonld"
                          "@type": "ion:CreditApproval"
                          offerReference: "BMTAP-KTA-2024-05-10-04421"
                          offerStatus: "APPROVED"
                          approvedPrincipal: { value: 50000000, currency: "IDR" }
                          approvedTenor: { value: 48, unit: "MONTHS" }
                          effectiveRate: { percentPerYear: 9.5, method: "FLAT", yieldType: "FIXED" }
                          monthlyInstallment:
