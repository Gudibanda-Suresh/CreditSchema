  # ── FULFILLMENT ───────────────────────────────────────────────────────────
  /status:
    post:
      operationId: status
      tags: [Fulfillment]
      summary: BAP requests current loan status and collectibility
      description: >
        The BAP requests the latest state of an active loan contract. The BPP
        responds via `/on_status` with the current `ion:LoanAgreement` including
        OJK SLIK collectibility grade, outstanding balance, and next EMI details.
        **BAPs SHOULD NOT long-poll** — use `/on_status` push for state changes.
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context'
                    - type: object
                      properties:
                        action:
                          type: string
                          enum: [status]
                message:
                  $ref: '#/components/schemas/StatusAction'
            example:
              context:
                version: "2.0.0"
                action: "status"
                domain: "ion:finance"
                bapId: "superapp.id"
                bapUri: "https://superapp.id/beckn"
                bppId: "bmtap-gateway.co.id"
                bppUri: "https://bmtap-gateway.co.id/beckn"
                transactionId: "txn-a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                messageId: "msg-99990000-aaaa-bbbb-cccc-ddddeeeeffff"
                timestamp: "2024-06-01T10:00:00+07:00"
                ttl: "PT30S"
              message:
                contract:
                  id: "d4e5f6a7-88ee-8d2f-4de6-1g95h4j30442"
      responses:
        '200':
          description: ACK — status request received; current state follows via `/on_status`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '409':
          $ref: '#/components/responses/AckNoCallback'
        '500':
          $ref: '#/components/responses/ServerError'

  /on_status:
    post:
      operationId: onStatus
      tags: [Fulfillment]
      summary: BPP returns current loan state, collectibility, and outstanding balance
      description: >
        Returns the current `ion:LoanAgreement` state including OJK SLIK
        collectibility grade (kolektibilitas 1–5), outstanding principal,
        next EMI due date, overdue amount, and payment history summary.
        The BPP MAY call this proactively (push) for significant state changes
        without waiting for a `/status` request.
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context'
                    - type: object
                      properties:
                        action:
                          type: string
                          enum: [on_status]
                message:
                  $ref: '#/components/schemas/OnStatusAction'
      responses:
        '200':
          description: ACK from BAP — status received
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /update:
    post:
      operationId: update
      tags: [Fulfillment]
      summary: BAP requests a contract mutation (document upload, prepayment, restructure)
      description: >
        The BAP requests a change to an active contract. Supported update types:
        - `DOCUMENT_UPLOAD` — submit additional KYC/collateral documents
        - `PREPAYMENT` — partial or full early repayment (Pelunasan Dipercepat)
        - `RESTRUCTURE_REQUEST` — request loan restructuring per POJK 40/2019
        - `ADDRESS_CHANGE` — update borrower registered address
        - `REPAYMENT_MODE_CHANGE` — change EMI payment method

        Supports the `context.try` two-phase pattern:
        `try: true` → preview updated terms without committing;
        `try: false` → commit the update.
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context'
                    - type: object
                      properties:
                        action:
                          type: string
                          enum: [update]
                        try:
                          type: boolean
                          default: false
                          description: "true = preview only (no state change); false = commit"
                message:
                  $ref: '#/components/schemas/UpdateAction'
            example:
              context:
                version: "2.0.0"
                action: "update"
                domain: "ion:finance"
                try: false
                bapId: "superapp.id"
                bapUri: "https://superapp.id/beckn"
                bppId: "bmtap-gateway.co.id"
                bppUri: "https://bmtap-gateway.co.id/beckn"
                transactionId: "txn-a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                messageId: "msg-aaaabbbb-cccc-dddd-eeee-ffff00001111"
                timestamp: "2024-08-01T09:00:00+07:00"
                ttl: "PT30S"
              message:
                updateTarget: "contract"
                contract:
                  id: "d4e5f6a7-88ee-8d2f-4de6-1g95h4j30442"
                  tags:
                    - descriptor: { code: "updateRequest" }
                      list:
                        - descriptor: { code: "updateType" }
                          value: "PREPAYMENT"
                        - descriptor: { code: "prepaymentAmount" }
                          value: "10000000"
                        - descriptor: { code: "currency" }
                          value: "IDR"
                        - descriptor: { code: "requestedDate" }
                          value: "2024-08-05"
      responses:
        '200':
          description: ACK — update acknowledged; revised contract follows via `/on_update`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '409':
          $ref: '#/components/responses/AckNoCallback'
        '500':
          $ref: '#/components/responses/ServerError'

  /on_update:
    post:
      operationId: onUpdate
      tags: [Fulfillment]
      summary: BPP returns updated contract with revised terms (async callback)
      description: >
        If `context.try: true` — returns preview of updated terms without state change.
        If `context.try: false` — returns the committed updated contract.
        For prepayments: includes new outstanding balance and revised schedule.
        The BPP MAY call this proactively without a BAP `/update` request.
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context'
                    - type: object
                      properties:
                        action:
                          type: string
                          enum: [on_update]
                message:
                  $ref: '#/components/schemas/OnUpdateAction'
      responses:
        '200':
          description: ACK from BAP — update result received
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /cancel:
    post:
      operationId: cancel
      tags: [Fulfillment]
      summary: BAP requests cancellation of a credit application or full loan foreclosure
      description: >
        Supports two scenarios:
        - **Pre-disbursement**: withdraw a credit application (states: DRAFT / UNDER_EVALUATION)
        - **Post-disbursement**: full early closure / foreclosure (Pelunasan Dipercepat)

        Supports the `context.try` two-phase pattern:
        `try: true` → preview cancellation terms (fees, refund) without committing;
        `try: false` → commit the cancellation.
      parameters:
        - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context, message]
              properties:
                context:
                  allOf:
                    - $ref: '#/components/schemas/Context'
                    - type: object
                      properties:
                        action:
                          type: string
                          enum: [cancel]
                        try:
                          type: boolean
                          default: false
                message:
                  $ref: '#/components/schemas/CancelAction'
      responses:
        '200':
          description: ACK — cancellation request received; result follows via `/on_cancel`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '400':
          $ref: '#/components/responses/NackBadRequest'
        '401':
          $ref: '#/components/responses/NackUnauthorized'
        '409':
          $ref: '#/components/responses/AckNoCallback'
        '500':
          $ref: '#/components/responses/ServerError'

  /on_cancel:
    post:
      operationId: onCancel
      tags: [Fulfillment]
      summary: BPP returns cancellation terms or confirms loan closure
      description: >
